<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sistema ByLiliana - Control de Producción</title>
    <style>
        /* Estilos CSS (Se mantiene tu estilo original) */
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; }
        #root { padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5em; color: #333; }
        .header button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; background-color: #007bff; color: white; }
        .order-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .card-body { padding: 15px; }
        .card-footer { display: flex; justify-content: space-between; padding: 15px; background-color: #f8f8f8; border-top: 1px solid #eee; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .status-badge.pending { background-color: #ffc107; color: #333; }
        .status-badge.finished { background-color: #28a745; color: white; }
        .status-badge.in-progress { background-color: #007bff; color: white; }
        .status-badge.cancelled { background-color: #dc3545; color: white; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; position: relative; }
        .close-button { position: absolute; top: 10px; right: 10px; border: none; background: transparent; font-size: 1.5em; cursor: pointer; }
        .image-preview { width: 100%; height: 200px; background-color: #f0f0f0; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 15px; border-radius: 5px; }

        /* ESTILOS ESPECÍFICOS DE LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #3f51b5; /* Color corporativo */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 1001;
        }
        #login-form {
            background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 300px; text-align: center; color: #333;
        }
        #login-form input {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        #login-form button {
            width: 100%; padding: 10px; background-color: #ff5722; color: white; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold; margin-top: 15px; transition: background-color 0.3s;
        }
        #login-form button:hover {
            background-color: #e64a19;
        }
        #login-error { color: #dc3545; margin-top: 10px; font-weight: bold; }

    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>

    <div id="login-screen">
        <div id="login-form">
            <h2>Acceso al Sistema ByLiliana</h2>
            <input type="email" id="login-email" placeholder="Correo Electrónico" required>
            <input type="password" id="login-password" placeholder="Contraseña" required>
            <button onclick="handleLogin()">Iniciar Sesión</button>
            <p id="login-error" style="display: none;">Error de inicio de sesión.</p>
        </div>
    </div>
    
    <div id="root" style="display: none;">
        <div class="header">
            <h1 id="user-display">Sistema de Producción (Sesión: Desconocido)</h1>
            <div>
                <button onclick="openModal('new-order-modal')">➕ Nueva Orden</button>
                <button onclick="openModal('settings-modal')">⚙️ Ajustes</button>
                <button onclick="handleLogout()">🚪 Cerrar Sesión</button>
            </div>
        </div>
        <div class="order-list" id="order-list">
            </div>
    </div>

    <div id="new-order-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="close-button" onclick="closeModal('new-order-modal')">&times;</button>
            <h3>Crear Nueva Orden</h3>
            <form id="new-order-form">
                <input type="number" id="new-order-id" placeholder="ID/Código de Orden" required><br><br>
                <input type="text" id="new-order-client" placeholder="Cliente" required><br><br>
                <input type="text" id="new-order-model" placeholder="Modelo/Código de Diseño" required oninput="updateImagePreview(this.value, 'new-image-preview')"><br><br>
                <div id="new-image-preview" class="image-preview"></div>
                <textarea id="new-order-details" placeholder="Detalles de la Orden" rows="4"></textarea><br><br>
                <select id="new-order-status" required>
                    <option value="pending">Pendiente</option>
                    <option value="in-progress">En Progreso</option>
                </select><br><br>
                <button type="submit">Guardar Orden</button>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="close-button" onclick="closeModal('settings-modal')">&times;</button>
            <h3>Configuración de Repositorios de Imágenes</h3>
            <div id="current-repos">
                <h4>Repositorios Activos:</h4>
                <ul id="repo-list"></ul>
            </div>
            <hr>
            <h4>Añadir Nuevo Repositorio:</h4>
            <input type="text" id="new-repo-url" placeholder="Ej: https://raw.githubusercontent.com/usuario/repo/" style="width: 100%; padding: 8px;"><br><br>
            <button onclick="addRepoUrl()">Añadir</button>
            <button onclick="saveSettings()">Guardar Configuración</button>
        </div>
    </div>
    
    <div id="edit-order-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="close-button" onclick="closeModal('edit-order-modal')">&times;</button>
            <h3>Editar Orden</h3>
            <form id="edit-order-form">
                <input type="hidden" id="edit-order-id-hidden">
                <input type="number" id="edit-order-id" placeholder="ID/Código de Orden" readonly><br><br>
                <input type="text" id="edit-order-client" placeholder="Cliente" required><br><br>
                <input type="text" id="edit-order-model" placeholder="Modelo/Código de Diseño" required oninput="updateImagePreview(this.value, 'edit-image-preview')"><br><br>
                <div id="edit-image-preview" class="image-preview"></div>
                <textarea id="edit-order-details" placeholder="Detalles de la Orden" rows="4"></textarea><br><br>
                <select id="edit-order-status" required>
                    <option value="pending">Pendiente</option>
                    <option value="in-progress">En Progreso</option>
                    <option option value="finished">Terminado</option>
                    <option value="cancelled">Cancelada</option>
                </select><br><br>
                <button type="submit">Actualizar Orden</button>
                <button type="button" onclick="deleteOrder()" style="background-color: #dc3545; margin-left: 10px;">Eliminar Orden</button>
            </form>
        </div>
    </div>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            // Reemplaza con tus propias claves de Firebase
            apiKey: "AIzaSyBqHgV4vDat1-VmZfKbiPg7nuiX-ROcexw", 
            authDomain: "cirineo-cec21.firebaseapp.com",
            projectId: "cirineo-cec21",
            storageBucket: "cirineo-cec21.firebasestorage.app",
            messagingSenderId: "620210618284",
            appId: "1:620210618284:web:482bab9bf74650fff18409",
            measurementId: "G-B7YLM78RVW"
        };
        
        let db;
        let repoUrls = [];
        
        // 3. Lógica de Autenticación
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorElement = document.getElementById('login-error');
            errorElement.style.display = 'none';
            
            // Intenta iniciar sesión con Firebase
            firebase.auth().signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    // Muestra el error si falla el inicio de sesión
                    errorElement.textContent = 'Error: Credenciales inválidas. (' + error.code.split('/')[1].replace(/-/g, ' ') + ')';
                    errorElement.style.display = 'block';
                });
        }
        
        function handleLogout() {
            firebase.auth().signOut().then(() => {
                // Oculta la app, muestra el login y recarga la página
                document.getElementById('root').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                window.location.reload(); 
            });
        }
        
        // Inicialización y Monitoreo de Sesión
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Usuario autenticado: Inicia la aplicación principal
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('root').style.display = 'block';
                document.getElementById('user-display').textContent = `Sistema de Producción (Sesión: ${user.email})`;

                // Inicializa Firestore solo si hay sesión
                db = firebase.firestore(); 
                startApp(); // Llama a la función que contiene toda la lógica de la app

            } else {
                // Usuario no autenticado: Muestra la pantalla de login
                document.getElementById('root').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            }
        });

        // 4. FUNCIÓN QUE CONTIENE TODA LA LÓGICA DE TU APP
        // Tu código anterior va dentro de esta función
        function startApp() {
            // ********** INICIO DE TU CÓDIGO ANTERIOR **********
            
            // ----------------------------------------------------
            // Lógica de Repositorios (Settings)
            // ----------------------------------------------------
            
            const settingsDoc = db.collection('settings').doc('image_repos');

            // Cargar Repositorios al iniciar y en tiempo real
            settingsDoc.onSnapshot(doc => {
                if (doc.exists) {
                    repoUrls = doc.data().urls || [];
                    renderRepoList();
                } else {
                    repoUrls = [];
                    renderRepoList();
                    // Crea el documento si no existe (inicialización)
                    settingsDoc.set({ urls: repoUrls });
                }
            });

            function renderRepoList() {
                const list = document.getElementById('repo-list');
                list.innerHTML = '';
                if (repoUrls.length === 0) {
                    list.innerHTML = '<li>No hay repositorios configurados.</li>';
                    return;
                }
                repoUrls.forEach((url, index) => {
                    const li = document.createElement('li');
                    li.textContent = url;
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Eliminar';
                    deleteBtn.style.marginLeft = '10px';
                    deleteBtn.onclick = () => removeRepoUrl(index);
                    li.appendChild(deleteBtn);
                    list.appendChild(li);
                });
            }

            function addRepoUrl() {
                const input = document.getElementById('new-repo-url');
                const url = input.value.trim();
                if (url && !repoUrls.includes(url)) {
                    repoUrls.push(url);
                    input.value = '';
                    renderRepoList();
                }
            }

            function removeRepoUrl(index) {
                repoUrls.splice(index, 1);
                renderRepoList();
            }

            function saveSettings() {
                // Actualiza el documento en Firestore
                settingsDoc.set({ urls: repoUrls })
                    .then(() => {
                        alert("Configuración de repositorios guardada.");
                        closeModal('settings-modal');
                    })
                    .catch(error => {
                        console.error("Error al guardar la configuración: ", error);
                        alert("Error al guardar la configuración.");
                    });
            }

            // ----------------------------------------------------
            // Lógica de Órdenes
            // ----------------------------------------------------
            
            const ordersCollection = db.collection('orders');
            const orderListElement = document.getElementById('order-list');
            
            // Función para renderizar una tarjeta de orden
            function renderOrderCard(order) {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.onclick = () => openEditModal(order); 

                let statusClass = order.status; // pending, in-progress, finished, cancelled
                
                card.innerHTML = `
                    <div class="card-body">
                        <strong>#${order.id}</strong> - ${order.client}
                        <hr>
                        <p>Modelo: ${order.model}</p>
                        <p>Detalles: ${order.details}</p>
                        <div class="image-preview" id="preview-${order.id}"></div>
                    </div>
                    <div class="card-footer">
                        <span class="status-badge ${statusClass}">${statusClass.toUpperCase().replace('-', ' ')}</span>
                        <span>Última act.: ${new Date(order.timestamp).toLocaleDateString()}</span>
                    </div>
                `;

                // Agregar tarjeta a la lista
                orderListElement.appendChild(card);
                
                // Cargar imagen de forma inteligente
                smartLoadImage(order.model, `preview-${order.id}`);
            }

            // Función principal para cargar y escuchar cambios
            ordersCollection.onSnapshot((snapshot) => {
                orderListElement.innerHTML = ''; // Limpiar la lista
                const orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                
                // Ordenar por ID (o timestamp si lo prefieres)
                orders.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                orders.forEach(renderOrderCard);
            });

            // Smart Image Loader (Carga desde múltiples URLs)
            function smartLoadImage(modelCode, elementId) {
                const element = document.getElementById(elementId);
                const imageFile = modelCode.toUpperCase().replace(/\s/g, '') + '.jpg';
                
                // Iterar sobre las URLs configuradas (GitHub, Local file://///, etc.)
                repoUrls.forEach(baseUrl => {
                    const fullUrl = baseUrl + imageFile;
                    const img = new Image();
                    
                    // Solo intentar cargar si la URL es válida
                    if (!fullUrl.startsWith('http') && !fullUrl.startsWith('file:///')) return; 

                    img.onload = () => {
                        // Si la imagen carga correctamente, se aplica el fondo y se detiene la búsqueda.
                        element.style.backgroundImage = `url('${fullUrl}')`;
                        element.style.backgroundColor = 'transparent';
                        element.onerror = null; // Detener listeners de error
                        return true;
                    };
                    img.onerror = () => {
                        // Si falla, el bucle continúa con la siguiente URL
                    };
                    img.src = fullUrl;
                });
                
                // Si ninguna imagen cargó (después del bucle), mostrar un fondo gris
                setTimeout(() => {
                    if (!element.style.backgroundImage) {
                         element.style.backgroundColor = '#f0f0f0';
                    }
                }, 500); // Dar medio segundo para intentar cargar
            }

            // Actualizar preview en los modales de creación/edición
            function updateImagePreview(modelCode, elementId) {
                const element = document.getElementById(elementId);
                element.style.backgroundImage = 'none'; // Limpiar la previa
                smartLoadImage(modelCode, elementId);
            }

            // Lógica para guardar/crear nueva orden
            document.getElementById('new-order-form').onsubmit = function(e) {
                e.preventDefault();
                const id = document.getElementById('new-order-id').value;
                const orderPayload = {
                    id: String(id), // Guardar ID como string para consistencia
                    client: document.getElementById('new-order-client').value,
                    model: document.getElementById('new-order-model').value,
                    details: document.getElementById('new-order-details').value,
                    status: document.getElementById('new-order-status').value,
                    timestamp: Date.now()
                };

                // Usar el ID como nombre del documento para acceso rápido
                ordersCollection.doc(orderPayload.id).set(orderPayload)
                    .then(() => {
                        closeModal('new-order-modal');
                        document.getElementById('new-order-form').reset();
                        alert('Orden creada con éxito!');
                    })
                    .catch(error => {
                        console.error("Error al crear la orden: ", error);
                        alert('Error al crear la orden. Verifica que el ID no exista.');
                    });
            };

            // Lógica para editar/actualizar orden
            let currentEditOrderId = null; // Variable global para la edición

            function openEditModal(order) {
                currentEditOrderId = order.id;
                document.getElementById('edit-order-id-hidden').value = order.id;
                document.getElementById('edit-order-id').value = order.id;
                document.getElementById('edit-order-client').value = order.client;
                document.getElementById('edit-order-model').value = order.model;
                document.getElementById('edit-order-details').value = order.details;
                document.getElementById('edit-order-status').value = order.status;
                
                // Cargar imagen de preview
                updateImagePreview(order.model, 'edit-image-preview');

                openModal('edit-order-modal');
            }

            document.getElementById('edit-order-form').onsubmit = function(e) {
                e.preventDefault();
                if (!currentEditOrderId) return;

                const updatedPayload = {
                    id: String(currentEditOrderId),
                    client: document.getElementById('edit-order-client').value,
                    model: document.getElementById('edit-order-model').value,
                    details: document.getElementById('edit-order-details').value,
                    status: document.getElementById('edit-order-status').value,
                    timestamp: Date.now() // Actualizar el timestamp
                };

                ordersCollection.doc(currentEditOrderId).update(updatedPayload)
                    .then(() => {
                        closeModal('edit-order-modal');
                        currentEditOrderId = null;
                        alert('Orden actualizada con éxito!');
                    })
                    .catch(error => {
                        console.error("Error al actualizar la orden: ", error);
                        alert('Error al actualizar la orden.');
                    });
            };

            // Lógica para eliminar orden
            function deleteOrder() {
                if (!currentEditOrderId || !confirm(`¿Estás seguro de ELIMINAR la orden #${currentEditOrderId}? Esta acción es irreversible.`)) {
                    return;
                }

                ordersCollection.doc(currentEditOrderId).delete()
                    .then(() => {
                        closeModal('edit-order-modal');
                        currentEditOrderId = null;
                        alert('Orden eliminada con éxito!');
                    })
                    .catch(error => {
                        console.error("Error al eliminar la orden: ", error);
                        alert('Error al eliminar la orden.');
                    });
            }

            // Lógica de Modales
            function openModal(id) {
                document.getElementById(id).style.display = 'flex';
            }

            function closeModal(id) {
                document.getElementById(id).style.display = 'none';
            }
            
            // Hacer las funciones globales (necesario para onclick en HTML)
            window.openModal = openModal;
            window.closeModal = closeModal;
            window.editOrder = openEditModal; 
            window.deleteOrder = deleteOrder;
            window.smartLoadImage = smartLoadImage; // Aunque no se usa directamente en HTML, es bueno tenerla
            window.updateImagePreview = updateImagePreview;
            window.addRepoUrl = addRepoUrl;
            window.saveSettings = saveSettings;
            
            // ********** FIN DE TU CÓDIGO ANTERIOR **********
        }

        // Estas funciones deben ser globales para que los botones del HTML (fuera de startApp) las encuentren
        window.handleLogin = handleLogin;
        window.handleLogout = handleLogout;
        
        
    </script>
</body>
</html>
