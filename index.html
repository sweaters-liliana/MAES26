        const generateCalendar = () => {
            const dates = [];
            const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
            // CORRECCIÓN: Inicio desde Diciembre 2025
            const start = new Date(2025, 11, 1); // Mes 11 es Diciembre
            const end = new Date(2026, 11, 31);
            let idx = 0;
            for (let d = start; d <= end; d.setDate(d.getDate() + 1)) {
                dates.push({
                    index: idx++,
                    id: `${['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`,
                    shortDay: ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'][d.getDay()],
                    dateNum: d.getDate(),
                    month: months[d.getMonth()],
                    monthIndex: d.getMonth(),
                    year: d.getFullYear(), 
                    isoDate: d.toISOString().split('T')[0] 
                });
            }
            return dates;
        };

        const ALL_ROWS = generateCalendar();
        const INITIAL_STATE = (() => {
            const todayISO = new Date().toISOString().split('T')[0];
            const foundIndex = ALL_ROWS.findIndex(r => r.isoDate === todayISO);
            const safeIndex = foundIndex !== -1 ? foundIndex : 0;
            return { weekOffset: Math.floor(safeIndex / 7), selectedDayIndex: safeIndex % 7 };
        })();

        const getWeekLabel = (weekRows) => {
            if (!weekRows || weekRows.length === 0) return '';
            const f = weekRows[0], l = weekRows[weekRows.length - 1];
            return f.month === l.month ? `${f.month} ${f.year}` : `${f.month} - ${l.month} ${l.year}`;
        };

        const calculateConsumptionDetails = (order, producedQty = 0) => {
            if (!order || !order.totalQty || !order.pieceWeightGrams) return { totalNeeded: 0, consumption: [], totalYarnKilos: 0, producedYarnKilos: 0 };
            const totalQty = Number(order.totalQty);
            const pieceWeightGrams = Number(order.pieceWeightGrams);
            const materials = order.materials || [];
            const waste = 1 + (Number(order.wastePercentage) / 100);

            const totalYarnGramsNeeded = totalQty * pieceWeightGrams * waste;
            const totalYarnKilos = totalYarnGramsNeeded / 1000;
            const producedYarnGrams = producedQty * pieceWeightGrams * waste;
            const producedYarnKilos = producedYarnGrams / 1000;
            
            const consumption = materials.filter(m => m.name && m.percentage).map(m => {
                const percent = Number(m.percentage) / 100;
                return { name: m.name, percentage: m.percentage, kilosNeeded: (totalYarnKilos * percent), kilosConsumed: (producedYarnKilos * percent) };
            });
            return { totalNeeded: totalQty, consumption, totalYarnKilos, producedYarnKilos };
        };

        const ProductionSlot = ({ slotData, index, disabled, onUpdate }) => {
            const [localQty, setLocalQty] = useState('');
            const [isDirty, setIsDirty] = useState(false);

            useEffect(() => { 
                if (!isDirty) setLocalQty(slotData?.qty ?? ''); 
            }, [slotData, isDirty]);

            const handleSave = () => {
                if (String(localQty) !== String(slotData?.qty ?? '')) onUpdate(index, 'qty', localQty);
                setIsDirty(false);
            };
            
            const handleChange = (v) => { setLocalQty(v); setIsDirty(true); };
            const handleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleSave(); e.target.blur(); } };

            // CORRECCIÓN: Eliminado input MOD. Solo input CANTIDAD ocupando todo el alto.
            return (
                <div className={`flex items-center justify-center border border-slate-700/50 rounded overflow-hidden h-full relative ${disabled ? 'bg-slate-900/20 opacity-40' : 'bg-slate-800'} ${isDirty ? 'border-yellow-500/50' : ''}`}>
                    <input type="number" placeholder="-" value={localQty} onChange={(e) => handleChange(e.target.value)} onBlur={handleSave} onKeyDown={handleKeyDown} disabled={disabled} className="slot-input" />
                    {isDirty && !disabled && (<div className="absolute top-1 right-1 w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>)}
                </div>
            );
        };
        // --- CÁLCULO PROYECCIÓN Y DESVIACIÓN (CORREGIDO) ---
        const calculateOrderMetrics = (machineId, order, allProductionData, allRows, globalHiddenDays) => {
            const metrics = { 
                isPlanned: false, finishDate: null, totalNeeded: 0, progress: 0, produced: 0, 
                dailyCapacity: 0, plannedToDate: 0, deviation: 0, status: 'OK'
            };
            
            if (!order || !order.totalQty || !order.timePerPieceMin || !order.startDate) return metrics;
            
            const totalQty = Number(order.totalQty);
            let dailyHours = order.operators && Array.isArray(order.operators) ? order.operators.length * 12 : Number(order.dailyHours || 12);
            const timePerPieceMin = Number(order.timePerPieceMin);
            const disabledDates = order.disabledDates || []; 
            
            metrics.dailyCapacity = Math.floor((dailyHours * 60) / timePerPieceMin);
            metrics.isPlanned = true;
            
            // 1. Producción Real (Sumando TODOS los días desde el inicio)
            let produced = 0;
            let plannedToDate = 0;
            const todayISO = new Date().toISOString().split('T')[0];
            const startISO = order.startDate;
            
            // Iteramos sobre TODO el calendario para sumar la producción real asociada a esta máquina
            // Solo sumamos producción a partir de la fecha de inicio del pedido
            allRows.forEach(row => {
                const rowDate = row.isoDate;
                
                // Si la fecha es mayor o igual al inicio del pedido
                if (rowDate >= startISO) {
                    // Obtenemos la producción de ese día específico
                    const dayData = allProductionData[row.id]?.[machineId];
                    const dayActual = Number(dayData?.actual || 0);
                    produced += dayActual;

                    // Cálculo de lo planeado hasta ayer/hoy
                    if (rowDate < todayISO || (rowDate === todayISO)) {
                        const isHidden = globalHiddenDays.includes(row.id);
                        const isDisabled = disabledDates.includes(rowDate);
                        // Solo sumamos capacidad planeada si no es día oculto, ni deshabilitado, y es <= hoy
                        if (!isHidden && !isDisabled && rowDate <= todayISO) {
                             // Si es hoy, sumamos proporcional o completo? Vamos a sumar completo para simplificar la meta diaria
                            plannedToDate += metrics.dailyCapacity;
                        }
                    }
                }
            });
            
            metrics.produced = produced;
            metrics.plannedToDate = plannedToDate;
            metrics.deviation = produced - plannedToDate; 
            metrics.progress = totalQty > 0 ? Math.min(100, (produced / totalQty) * 100) : 0;

            // Status
            if (metrics.deviation < -metrics.dailyCapacity * 1.5) metrics.status = 'ATRASO CRÍTICO';
            else if (metrics.deviation < 0) metrics.status = 'ATRASO LEVE';

            const remainingQty = Math.max(0, totalQty - produced);
            
            if (remainingQty <= 0) {
                metrics.finishDate = todayISO; 
                metrics.progress = 100;
                metrics.status = 'COMPLETADO';
                return metrics;
            }
            
            metrics.totalNeeded = remainingQty;
            
            // 2. Proyección Futura (Buscando fecha fin)
            let projRemaining = remainingQty;
            
            // Empezamos a proyectar desde MAÑANA si ya sumamos la capacidad de hoy, 
            // o desde HOY si no se ha producido nada hoy. Para seguridad, proyectamos desde hoy hacia adelante
            // buscando días hábiles disponibles.
            const todayIndex = allRows.findIndex(r => r.isoDate === todayISO);
            let startIndex = todayIndex !== -1 ? todayIndex : 0;

            // Si el pedido empieza en el futuro, la proyección inicia en su fecha de inicio
            const orderStartIndex = allRows.findIndex(r => r.isoDate === startISO);
            if (orderStartIndex > startIndex) startIndex = orderStartIndex;

            for (let i = startIndex; i < allRows.length; i++) {
                const row = allRows[i];
                if (globalHiddenDays.includes(row.id) || disabledDates.includes(row.isoDate)) continue;
                
                projRemaining -= metrics.dailyCapacity; 
                if (projRemaining <= 0) {
                    metrics.finishDate = row.isoDate; 
                    return metrics;
                }
            }

            metrics.finishDate = null; // +60 días
            return metrics;
        };

        // --- GESTIÓN DE USUARIOS MODAL ---

                                <div className="space-y-3">
                                    <input type="number" value={pin} onChange={e => setPin(e.target.value.slice(0, 4))} disabled={!!editingUser} placeholder="PIN (4 dig)" className="w-full bg-slate-700 text-white p-2 rounded font-bold outline-none" />
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Nombre" className="w-full bg-slate-700 text-white p-2 rounded outline-none" />
                                    <input type="text" value={area} onChange={e => setArea(e.target.value)} placeholder="Área" className="w-full bg-slate-700 text-white p-2 rounded outline-none" />
                                    <select value={role} onChange={e => setRole(e.target.value)} className="w-full bg-slate-700 text-white p-2 rounded outline-none uppercase">{availableRoles.map(r => (<option key={r} value={r}>{r}</option>))}</select>
                                </div>
                                <button onClick={handleSave} className="w-full mt-4 py-2 rounded bg-green-600 text-white font-bold">Guardar</button>
                            </div>
                            <div className="flex-1 space-y-3">
                                {allUsersArray.map(u => (
                                    <div key={u.pin} className="bg-slate-900 p-3 rounded border border-slate-700 flex justify-between items-center">
                                        <div><p className="font-bold text-white">{u.name}</p><p className="text-xs text-blue-400 uppercase">{u.role} - {u.area}</p></div>
                                        <div className="flex items-center gap-2"><span className="text-xl font-black text-slate-500 mr-2">{u.pin}</span>
                                            <button onClick={() => startEdit(u)} className="p-1 bg-slate-700 rounded text-blue-400"><i data-lucide="pencil" className="w-4 h-4"></i></button>

                                    </div>
                                ))}
                            </div>

                    </div>
                </div>
            );
        };
        
        // --- REPORTE MODAL ---
        const ReportModal = ({ onClose, machineId, order, metrics, onPromote }) => {

            const machine = MACHINES.find(m => m.id === machineId);
            const consumptionData = calculateConsumptionDetails(order, metrics.produced);

                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-3xl h-[90vh] flex flex-col border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>

                        <div className="flex-1 overflow-y-auto custom-scrollbar report-page">

                        {isCompleted && onPromote && (

        // --- GESTIÓN DE PEDIDOS MODAL ---
        const OrderManager = React.forwardRef(({ onClose, onSaveOrders, onDeleteOrder, ordersData, allProductionData, allRows, hiddenDays }, ref) => {
            const [selectedMachineId, setSelectedMachineId] = useState(MACHINES[0].id);
            const [localOrders, setLocalOrders] = useState({}); // { orderId: { ...data } }
            const [orderModal, setOrderModal] = useState(null); // null or { order, type: 'new' | 'edit' }
            const [showQueueModal, setShowQueueModal] = useState(false); // Modal para decidir si reemplazar o poner en cola

            const machineOrders = useMemo(() => ordersData[selectedMachineId] || {}, [ordersData, selectedMachineId]);
            const currentOrder = machineOrders.current;
            const nextOrder = machineOrders.next;
            
            // Sincroniza localOrders con ordersData al cambiar de máquina
            useEffect(() => {
                const combinedOrders = {};
                if (currentOrder) combinedOrders[currentOrder.id] = currentOrder;
                if (nextOrder) combinedOrders[nextOrder.id] = nextOrder;
                setLocalOrders(combinedOrders);
            }, [selectedMachineId, currentOrder, nextOrder]);

            // Función expuesta por ref para abrir el modal de orden
            React.useImperativeHandle(ref, () => ({
                openOrderModal: (machineId) => {
                    setSelectedMachineId(machineId);
                    // Si no hay pedido actual, se crea uno nuevo directamente
                    if (!ordersData[machineId]?.current) {
                        setOrderModal({ order: null, type: 'new' });
                    } else {
                        // Si hay, se abre el modal para editar el actual por defecto
                        setOrderModal({ order: ordersData[machineId].current, type: 'edit' });
                    }
                }
            }));

            const handleSave = (newOrder, isQueue) => {
                if (newOrder.id && localOrders[newOrder.id]) {
                    // Si es edición, actualiza el pedido local
                    setLocalOrders(prev => ({ ...prev, [newOrder.id]: { ...prev[newOrder.id], ...newOrder } }));
                    onSaveOrders(selectedMachineId, { ...localOrders, [newOrder.id]: newOrder }, 'edit');
                    setOrderModal(null);
                    setShowQueueModal(false);
                    return;
                }

                // Es un pedido nuevo
                if (currentOrder) {
                    // LÓGICA CORREGIDA PARA COLA
                    if (isQueue) {
                         // Agendar en cola
                        const ordersToSave = { 
                            ...localOrders, 
                            [newOrder.id]: { ...newOrder, isNext: true }
                        };
                        onSaveOrders(selectedMachineId, ordersToSave, 'queue');
                        setOrderModal(null);
                        setShowQueueModal(false);
                    } else {
                        // Reemplazar actual (borrar actual)
                        const ordersToSave = { 
                            [newOrder.id]: newOrder // Solo el nuevo
                        };
                        onSaveOrders(selectedMachineId, ordersToSave, 'replace');
                        setOrderModal(null);
                        setShowQueueModal(false);
                    }
                } else {
                    // No hay pedido actual, crear como current
                    const ordersToSave = { [newOrder.id]: newOrder };
                    onSaveOrders(selectedMachineId, ordersToSave, 'new');
                    setOrderModal(null);
                    setShowQueueModal(false);
                }
            };

            const handleNewOrderClick = () => {
                // Si ya hay un pedido, mostramos el modal de decisión
                if (currentOrder) {
                    setShowQueueModal(true);
                } else {
                    // Si no hay nada, abrimos el modal de creación directamente
                    setOrderModal({ order: null, type: 'new' });
                }
            };

            // Modal de Decisión: Reemplazar o Agendar en Cola
            const QueueDecisionModal = () => {
                const [tempOrder, setTempOrder] = useState(null);

                const openNewOrderForm = (type) => {
                    const newId = `ord-${Date.now()}`;
                    const newOrderPayload = { id: newId, model: 'NUEVO PEDIDO', totalQty: 1000, timePerPieceMin: 0.8, dailyHours: 12, startDate: ALL_ROWS[INITIAL_STATE.selectedDayIndex].isoDate, pieceWeightGrams: 100, wastePercentage: 10, materials: [{ name: 'Hilo A', percentage: 100 }] };
                    setTempOrder(newOrderPayload); // Guarda el borrador
                    setShowQueueModal(false);
                    
                    // Ahora abrimos el modal de edición/creación real
                    setOrderModal({ 
                        order: newOrderPayload, 
                        type: 'new', 
                        isQueue: type === 'queue', 
                        isReplace: type === 'replace' 
                    });
                };
                
                if (orderModal) return null; // El modal de orden ya está abierto
                
                return (
                    <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4 fade-in" onClick={() => setShowQueueModal(false)}>
                        <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md p-6 border border-slate-700 animate-zoom-in" onClick={e => e.stopPropagation()}>
                            <h4 className="text-xl font-bold text-white mb-4">Gestión de Nuevo Pedido</h4>
                            <p className="text-slate-400 mb-6">Ya existe un pedido activo para {MACHINES.find(m => m.id === selectedMachineId)?.name}. ¿Deseas reemplazarlo o agendarlo para después?</p>
                            <div className="space-y-4">
                                <button onClick={() => openNewOrderForm('replace')} className="w-full py-3 rounded bg-red-600 hover:bg-red-500 text-white font-bold transition flex items-center justify-center gap-2">
                                    <i data-lucide="trash-2" className="w-5 h-5"></i> REEMPLAZAR Pedido Actual
                                </button>
                                <button onClick={() => openNewOrderForm('queue')} className="w-full py-3 rounded bg-yellow-600 hover:bg-yellow-500 text-white font-bold transition flex items-center justify-center gap-2">
                                    <i data-lucide="chevrons-right" className="w-5 h-5"></i> AGENDAR en Cola (Siguiente)
                                </button>
                                <button onClick={() => setShowQueueModal(false)} className="w-full py-2 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-medium transition">Cancelar</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const OrderFormModal = ({ order, type, onClose, onSave, isQueue = false, isReplace = false }) => {
                const [localOrder, setLocalOrder] = useState(order || {});
                const [materials, setMaterials] = useState(localOrder.materials || [{ name: '', percentage: 100 }]);
                const isEdit = type === 'edit';

                useEffect(() => {
                    // Calcular el total de porcentajes y ajustar el último si es necesario
                    const totalPct = materials.slice(0, -1).reduce((sum, m) => sum + Number(m.percentage || 0), 0);
                    if (totalPct > 100) {
                        alert('La suma de porcentajes de materiales no puede superar el 100%');
                    }
                    setMaterials(prev => {
                        const newMats = [...prev];
                        if (newMats.length > 0) {
                            newMats[newMats.length - 1].percentage = Math.max(0, 100 - totalPct);
                        }
                        return newMats;
                    });
                }, [materials.map(m => m.percentage).join(',')]);

                const handleMaterialChange = (index, field, value) => {
                    setMaterials(prev => {
                        const newMats = [...prev];
                        newMats[index] = { ...newMats[index], [field]: value };
                        return newMats;
                    });
                };

                const handleAddMaterial = () => {
                    setMaterials(prev => [...prev, { name: '', percentage: 0 }]);
                };

                const handleRemoveMaterial = (index) => {
                    setMaterials(prev => prev.filter((_, i) => i !== index));
                };

                const handleSubmit = () => {
                    if (!localOrder.model || !localOrder.totalQty || !localOrder.timePerPieceMin || !localOrder.startDate) {
                        return alert('Faltan campos obligatorios: Modelo, Cantidad, Tiempo/Pieza y Fecha de Inicio.');
                    }
                    if (materials.reduce((sum, m) => sum + Number(m.percentage || 0), 0) !== 100) {
                        return alert('La suma de porcentajes de materiales debe ser 100%.');
                    }

                    const finalOrder = {
                        ...localOrder,
                        materials: materials.filter(m => m.name && m.percentage > 0),
                        totalQty: Number(localOrder.totalQty),
                        timePerPieceMin: Number(localOrder.timePerPieceMin),
                        dailyHours: Number(localOrder.dailyHours || 12),
                        pieceWeightGrams: Number(localOrder.pieceWeightGrams || 100),
                        wastePercentage: Number(localOrder.wastePercentage || 10),
                        id: localOrder.id || `ord-${Date.now()}`
                    };

                    // La lógica de isQueue/isReplace se pasa a handleSave en el OrderManager
                    onSave(finalOrder, isQueue); 
                };

                const selectedDateObj = ALL_ROWS.find(r => r.isoDate === localOrder.startDate);
                
                return (
                    <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4 fade-in" onClick={onClose}>
                        <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-3xl h-[90vh] flex flex-col border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900 no-print">
                                <h3 className="font-bold text-white uppercase text-sm flex items-center gap-2">
                                    <i data-lucide="package" className="w-5 h-5 text-green-400"></i> {isEdit ? `Editar ${localOrder.model}` : 'Nuevo Pedido'} {isQueue ? '(En Cola)' : isReplace ? '(Reemplazando)' : '(Actual)'}
                                </h3>
                                <button onClick={onClose}><i data-lucide="x" className="text-slate-400 w-5 h-5"></i></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                                <h4 className="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Datos Generales</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="text" value={localOrder.model || ''} onChange={e => setLocalOrder(prev => ({ ...prev, model: e.target.value }))} placeholder="Modelo / Descripción *" className="col-span-2 bg-slate-700 text-white p-3 rounded outline-none font-bold text-lg" />
                                    
                                    <input type="number" value={localOrder.totalQty || ''} onChange={e => setLocalOrder(prev => ({ ...prev, totalQty: e.target.value }))} placeholder="Cantidad Total (Pzas) *" className="bg-slate-700 text-white p-2 rounded outline-none" />
                                    <input type="number" value={localOrder.timePerPieceMin || ''} onChange={e => setLocalOrder(prev => ({ ...prev, timePerPieceMin: e.target.value }))} placeholder="Tiempo/Pza (Min) *" className="bg-slate-700 text-white p-2 rounded outline-none" />
                                    
                                    <input type="number" value={localOrder.pieceWeightGrams || ''} onChange={e => setLocalOrder(prev => ({ ...prev, pieceWeightGrams: e.target.value }))} placeholder="Peso/Pza (Gramos)" className="bg-slate-700 text-white p-2 rounded outline-none" />
                                    <input type="number" value={localOrder.wastePercentage || ''} onChange={e => setLocalOrder(prev => ({ ...prev, wastePercentage: e.target.value }))} placeholder="% Merma" className="bg-slate-700 text-white p-2 rounded outline-none" />
                                    
                                    <div className="col-span-2 flex items-center gap-4 bg-slate-700 p-2 rounded">
                                        <label className="text-slate-400">Fecha de Inicio *:</label>
                                        <input type="date" value={localOrder.startDate || ''} onChange={e => setLocalOrder(prev => ({ ...prev, startDate: e.target.value }))} className="bg-slate-700 text-white p-1 rounded outline-none" />
                                        {selectedDateObj && (<span className="text-xs text-green-400 font-bold">{selectedDateObj.shortDay}</span>)}
                                    </div>
                                    
                                    <div className="col-span-2">
                                        <label className="block text-slate-400 mb-1">Días Inhábiles (No producción):</label>
                                        {/* Simplified date management: A custom date picker is too complex for this context, using a simple text field or array display */}
                                        <p className="text-xs text-slate-500 italic">No implementado en esta versión, se usa la configuración global por ahora.</p>
                                    </div>
                                </div>

                                <h4 className="text-lg font-bold text-white mb-4 mt-6 border-b border-slate-700 pb-2">Materiales (100% Total)</h4>
                                <div className="space-y-3">
                                    {materials.map((m, index) => (
                                        <div key={index} className="flex gap-4 items-center">
                                            <input type="text" value={m.name} onChange={e => handleMaterialChange(index, 'name', e.target.value)} placeholder="Nombre Hilo" className="flex-1 bg-slate-700 text-white p-2 rounded outline-none" />
                                            <input type="number" value={m.percentage} onChange={e => handleMaterialChange(index, 'percentage', e.target.value)} placeholder="%" className="w-20 bg-slate-700 text-white p-2 rounded outline-none" />
                                            <span className="text-xl text-slate-400">%</span>
                                            {index < materials.length - 1 && (<button onClick={() => handleRemoveMaterial(index)} className="p-2 bg-red-900/50 rounded text-red-400"><i data-lucide="minus" className="w-4 h-4"></i></button>)}
                                        </div>
                                    ))}
                                </div>

                            </div>
                            <div className="p-4 border-t border-slate-700 bg-slate-900 flex justify-between no-print">
                                {isEdit && (<button onClick={() => { onDeleteOrder(selectedMachineId, localOrder.id); onClose(); }} className="px-4 py-2 rounded bg-red-600 text-white font-bold">Eliminar Pedido</button>)}
                                <div className="flex-1"></div>
                                <button onClick={handleSubmit} className="px-6 py-2 rounded bg-green-600 text-white font-bold">Guardar Pedido</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const metrics = calculateOrderMetrics(selectedMachineId, currentOrder, allProductionData, allRows, hiddenDays);
            const nextMetrics = calculateOrderMetrics(selectedMachineId, nextOrder, allProductionData, allRows, hiddenDays);
            const machine = MACHINES.find(m => m.id === selectedMachineId);
            
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900 no-print">
                            <h3 className="font-bold text-white uppercase text-sm flex items-center gap-2"><i data-lucide="factory" className="w-5 h-5 text-indigo-400"></i> Gestión de Pedidos - {machine?.name}</h3>
                            <button onClick={onClose}><i data-lucide="x" className="text-slate-400 w-5 h-5"></i></button>
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                            <div className="w-1/4 bg-slate-900 p-4 border-r border-slate-700 overflow-y-auto custom-scrollbar">
                                <h4 className="text-md font-bold text-yellow-400 mb-4">Máquinas</h4>
                                {MACHINES.map(m => (
                                    <button key={m.id} onClick={() => setSelectedMachineId(m.id)} className={`w-full text-left p-2 rounded mb-1 transition ${selectedMachineId === m.id ? 'bg-indigo-700 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                        {m.name}
                                    </button>
                                ))}
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
                                    <h4 className="text-xl font-bold text-white">Pedidos para {machine?.name}</h4>
                                    <button onClick={handleNewOrderClick} className="px-4 py-2 rounded bg-green-600 text-white font-bold flex items-center gap-2 hover:bg-green-500">
                                        <i data-lucide="plus" className="w-5 h-5"></i> Nuevo Pedido
                                    </button>
                                </div>

                                {/* Pedido Actual (Current) */}
                                <OrderCard title="Pedido Actual" order={currentOrder} metrics={metrics} onEdit={() => setOrderModal({ order: currentOrder, type: 'edit' })} isCurrent={true} />

                                {/* Pedido en Cola (Next) */}
                                <OrderCard title="Siguiente Pedido (Cola)" order={nextOrder} metrics={nextMetrics} onEdit={() => setOrderModal({ order: nextOrder, type: 'edit' })} isCurrent={false} />

                                {/* Indicador si hay un pedido en cola para el actual */}
                                {currentOrder && nextOrder && (
                                    <div className="mt-8 p-4 bg-yellow-900/50 border border-yellow-700 rounded-lg text-yellow-300 flex items-center gap-3">
                                        <i data-lucide="chevrons-right" className="w-6 h-6"></i>
                                        <p className="font-medium">Cuando el Pedido Actual ({currentOrder.model}) termine, el Siguiente ({nextOrder.model}) será promovido automáticamente.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        {showQueueModal && <QueueDecisionModal />}
                        {orderModal && <OrderFormModal order={orderModal.order} type={orderModal.type} isQueue={orderModal.isQueue} isReplace={orderModal.isReplace} onClose={() => setOrderModal(null)} onSave={handleSave} />}
                        
                        {/* Renderizar iconos de lucide si la librería está disponible */}
                        {typeof lucide !== 'undefined' && lucide.createIcons && lucide.createIcons()}
                    </div>
                </div>
            );
        });

        // Componente auxiliar para visualizar los pedidos
        const OrderCard = ({ title, order, metrics, onEdit, isCurrent }) => {
            if (!order) return (
                <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 mb-6">
                    <h5 className="text-xl font-bold text-white mb-2">{title}</h5>
                    <p className="text-slate-400 italic">No hay pedido {isCurrent ? 'actual' : 'en cola'} programado.</p>
                </div>
            );

            const consumptionData = calculateConsumptionDetails(order, metrics.produced);
            const isCompleted = metrics.status === 'COMPLETADO';
            
            return (
                <div className={`bg-slate-900 p-4 rounded-lg border ${isCurrent ? 'border-indigo-500' : 'border-yellow-500'} mb-6 relative`}>
                    <div className={`absolute -top-3 left-4 px-3 py-1 text-xs font-bold rounded-full ${isCurrent ? 'bg-indigo-600' : 'bg-yellow-600'} text-white`}>{title}</div>
                    <div className="mt-2 flex justify-between items-start">
                        <h5 className="text-2xl font-bold text-white">{order.model}</h5>
                        <button onClick={onEdit} className="px-3 py-1 rounded bg-slate-700 text-blue-400 font-bold text-sm flex items-center gap-1 hover:bg-slate-600 transition">
                            <i data-lucide="pencil" className="w-4 h-4"></i> Editar
                        </button>
                    </div>

                    <div className="mt-4 grid grid-cols-3 gap-3 text-sm">
                        <p className="text-slate-400">Total: <span className="text-white font-bold">{order.totalQty.toLocaleString()} pzas</span></p>
                        <p className="text-slate-400">Inicio: <span className="text-white font-bold">{order.startDate}</span></p>
                        <p className="text-slate-400">Fin Proy: <span className={`font-bold ${metrics.finishDate ? (isCompleted ? 'text-green-400' : 'text-yellow-400') : 'text-red-400'}`}>{metrics.finishDate ? metrics.finishDate : 'Indefinido (+60 días)'}</span></p>
                        
                        <p className="text-slate-400">Producido: <span className="text-white font-bold">{metrics.produced.toLocaleString()} pzas</span></p>
                        <p className="text-slate-400">Faltante: <span className="text-red-400 font-bold">{metrics.totalNeeded.toLocaleString()} pzas</span></p>
                        <p className="text-slate-400">Capacidad Diaria: <span className="text-white font-bold">{metrics.dailyCapacity.toLocaleString()} pzas</span></p>
                    </div>

                    <div className="mt-4">
                        <h6 className="text-sm font-bold text-slate-400 mb-1">Progreso ({metrics.progress.toFixed(1)}%)</h6>
                        <div className="w-full bg-slate-700 rounded-full h-2.5">
                            <div className="bg-green-500 h-2.5 rounded-full" style={{ width: `${metrics.progress}%` }}></div>
                        </div>
                    </div>
                    
                    <div className="mt-4 p-3 bg-slate-800 rounded-lg">
                         <h6 className="text-sm font-bold text-slate-400 mb-2 flex items-center gap-1"><i data-lucide="activity" className="w-4 h-4 text-blue-400"></i> Desviación y Materiales</h6>
                         <div className="grid grid-cols-2 gap-3 text-xs">
                             <p className="text-slate-400">Desviación: <span className={`font-bold ${metrics.deviation >= 0 ? 'text-green-400' : 'text-red-400'}`}>{metrics.deviation > 0 ? '+' : ''}{metrics.deviation.toLocaleString()} pzas</span></p>
                             <p className="text-slate-400">Total Hilo: <span className="text-white font-bold">{consumptionData.totalYarnKilos.toFixed(2)} KG</span></p>
                             <div className="col-span-2 text-xs text-slate-400">
                                 Materiales: {consumptionData.consumption.map(m => `${m.name} (${m.percentage}%)`).join(' | ')}
                             </div>
                         </div>
                    </div>
                </div>
            );
        };
        // --- COMPONENTE DE BARRA DE NAVEGACIÓN Y HERRAMIENTAS ---
        const NavBar = ({ user, onLogout, onOpenOrders, onOpenUsers, onOpenVisibility, onOpenReport, onFormatDB, onDownloadBackup }) => {
            const isDevelopment = user?.role === ROLES.DEVELOPMENT;
            const canManageOrders = user?.canManageOrders || [ROLES.ADMIN, ROLES.DEVELOPMENT].includes(user?.role);
            const canManageUsers = user?.canManageUsers || [ROLES.DEVELOPMENT].includes(user?.role);
            
            return (
                <header className="no-print bg-slate-900 border-b border-slate-700 p-3 flex justify-between items-center shadow-lg sticky top-0 z-10">
                    <div className="flex items-center gap-3">
                        <i data-lucide="factory" className="w-6 h-6 text-green-400"></i>
                        <h1 className="text-xl font-black text-white">MAES26 Control</h1>
                    </div>
                    
                    <nav className="flex items-center gap-4">
                        {canManageOrders && (
                            <button onClick={onOpenOrders} className="text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded transition flex items-center gap-1">
                                <i data-lucide="package" className="w-4 h-4"></i> Pedidos
                            </button>
                        )}
                        {canManageUsers && (
                            <button onClick={onOpenUsers} className="text-sm font-bold text-white bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded transition flex items-center gap-1">
                                <i data-lucide="users" className="w-4 h-4"></i> Usuarios
                            </button>
                        )}
                        {canManageOrders && (
                            <button onClick={onOpenVisibility} className="text-sm font-bold text-white bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded transition flex items-center gap-1">
                                <i data-lucide="eye-off" className="w-4 h-4"></i> Visibilidad
                            </button>
                        )}
                        {/* NUEVA BARRA DE DESARROLLADOR */}
                        {isDevelopment && (
                            <div className="flex items-center gap-2 bg-red-900/50 p-1.5 rounded-lg border border-red-700">
                                <span className="text-xs text-red-300 font-bold">DEV:</span>
                                <button onClick={onDownloadBackup} className="text-xs font-bold text-white bg-yellow-600 hover:bg-yellow-500 px-2 py-1 rounded transition flex items-center gap-1" title="Descargar Respaldo JSON">
                                    <i data-lucide="download" className="w-3 h-3"></i> Respaldo
                                </button>
                                <button onClick={onFormatDB} className="text-xs font-bold text-white bg-red-600 hover:bg-red-500 px-2 py-1 rounded transition flex items-center gap-1" title="Borrar toda la data de producción y pedidos">
                                    <i data-lucide="trash-2" className="w-3 h-3"></i> Formatear DB
                                </button>
                            </div>
                        )}
                    </nav>

                    <div className="flex items-center gap-3">
                        <span className="text-sm text-slate-300 hidden sm:block">{user?.name} ({user?.area})</span>
                        <button onClick={onLogout} className="bg-slate-700 text-red-400 p-2 rounded-full hover:bg-slate-600 transition" title="Cerrar Sesión">
                            <i data-lucide="log-out" className="w-5 h-5"></i>
                        </button>
                    </div>
                    {/* Renderizar iconos de lucide si la librería está disponible */}
                    {typeof lucide !== 'undefined' && lucide.createIcons && lucide.createIcons()}
                </header>
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            const [userPin, setUserPin] = useState('');
            const [user, setUser] = useState(null);
            const [usersData, setUsersData] = useState(DEFAULT_USERS);
            const [data, setData] = useState({}); // Producción
            const [ordersData, setOrdersData] = useState({}); // Pedidos
            const [visibilityConfig, setVisibilityConfig] = useState({ machines: [], days: [] });
            const [showOrderManager, setShowOrderManager] = useState(false);
            const [showUserManagementModal, setShowUserManagementModal] = useState(false);
            const [showVisibilityModal, setShowVisibilityModal] = useState(false);
            const [showCalendar, setShowCalendar] = useState(false);
            const [showReportModal, setShowReportModal] = useState(null); // { machineId, order, metrics }
            
            const orderManagerRef = useRef(null);

            useEffect(() => {
                // Autenticación anónima
                signInAnonymously(auth);

                // Escucha de Usuarios (Solo si el PIN no está seteado)
                if (!userPin) {
                    const unsubscribeUsers = onSnapshot(collection(db, "users"), (snapshot) => {
                        const newUsers = {};
                        snapshot.forEach(doc => {
                            newUsers[doc.id] = doc.data();
                        });
                        // Combina usuarios por defecto con los de la DB
                        setUsersData(prev => ({ ...DEFAULT_USERS, ...newUsers }));
                    }, (error) => {
                        console.error("Error fetching users:", error);
                    });
                    
                    return () => unsubscribeUsers();
                }

                // Escucha de Data de Producción
                const unsubscribeData = onSnapshot(collection(db, "productionData"), (snapshot) => {
                    const newData = {};
                    snapshot.forEach(doc => {
                        newData[doc.id] = doc.data();
                    });
                    setData(newData);
                }, (error) => { console.error("Error fetching production data:", error); });

                // Escucha de Pedidos
                const unsubscribeOrders = onSnapshot(collection(db, "orders"), (snapshot) => {
                    const newOrders = {};
                    snapshot.forEach(doc => {
                        const machineId = doc.id;
                        const machineOrders = doc.data();
                        // Separa el pedido actual del siguiente
                        const currentOrder = Object.values(machineOrders).find(o => !o.isNext);
                        const nextOrder = Object.values(machineOrders).find(o => o.isNext);
                        newOrders[machineId] = { 
                            current: currentOrder, 
                            next: nextOrder 
                        };
                    });
                    setOrdersData(newOrders);
                }, (error) => { console.error("Error fetching orders:", error); });
                
                // Escucha de Configuración de Visibilidad
                const unsubscribeVisibility = onSnapshot(doc(db, "config", "visibility"), (docSnap) => {
                    if (docSnap.exists()) {
                        setVisibilityConfig(docSnap.data());
                    }
                }, (error) => { console.error("Error fetching visibility config:", error); });

                return () => { 
                    unsubscribeData(); 
                    unsubscribeOrders(); 
                    unsubscribeVisibility();
                };
            }, [userPin]);
            
            // Lógica para promover el pedido en cola cuando el actual termina
            useEffect(() => {
                MACHINES.forEach(machine => {
                    const machineOrders = ordersData[machine.id];
                    if (machineOrders?.current) {
                        const metrics = calculateOrderMetrics(machine.id, machineOrders.current, data, ALL_ROWS, visibilityConfig.days || []);
                        if (metrics.status === 'COMPLETADO' && machineOrders.next) {
                            handlePromoteOrder(machine.id, machineOrders.current.id, machineOrders.next.id);
                        }
                    }
                });
            }, [data, ordersData, visibilityConfig.days]); // Dependencias para re-evaluar

            const handleLogin = () => {
                const foundUser = usersData[userPin];
                if (foundUser) {
                    setUser(foundUser);
                } else {
                    alert('PIN incorrecto o no registrado.');
                    setUserPin('');
                }
            };
            
            const handleLogout = () => { setUser(null); setUserPin(''); };

            // --- MANEJO DE DATOS FIREBASE ---

            const handleUpdateSlot = async (machineId, rowId, slotIndex, field, value) => {
                if (!user || user.role === ROLES.OBSERVER) return alert('Permiso denegado.');
                
                const dayRef = doc(db, "productionData", rowId);
                
                // Si el usuario es un operador con allowedSlots, valida el slot
                if (user.role === ROLES.OPERATOR && user.allowedSlots && !user.allowedSlots.includes(slotIndex)) {
                    return alert(`No tienes permiso para editar el slot ${slotIndex + 1}.`);
                }

                // Asegurar que el valor sea numérico
                const numericValue = Number(value);
                if (isNaN(numericValue) || numericValue < 0) return;
                
                const path = `${machineId}.slots.${slotIndex}.${field}`;
                
                // CORRECCIÓN CLAVE: El campo 'actual' (total producido del día) es la SUMA de todos los slots
                const machineData = data[rowId]?.[machineId] || { slots: [{}, {}], actual: 0 };
                const updatedSlots = [...(machineData.slots || [{}, {}])];
                updatedSlots[slotIndex] = { ...updatedSlots[slotIndex], [field]: numericValue };

                const totalActualDay = updatedSlots.reduce((sum, slot) => sum + Number(slot?.qty || 0), 0);
                
                try {
                    await setDoc(dayRef, {
                        [machineId]: {
                            ...machineData,
                            slots: updatedSlots,
                            actual: totalActualDay
                        }
                    }, { merge: true });
                } catch (error) {
                    console.error("Error updating slot:", error);
                }
            };
            
            // Nueva función para manejar guardado de pedidos (Lógica de Cola)
            const handleSaveOrder = async (machineId, ordersObject, saveType) => {
                if (!user || ![ROLES.ADMIN, ROLES.DEVELOPMENT, ROLES.OBSERVER].includes(user.role)) return alert('Permiso denegado.');
                
                const ordersRef = doc(db, "orders", machineId);
                const batch = writeBatch(db);
                
                // Si es 'replace', primero borramos todos los pedidos anteriores para esa máquina
                if (saveType === 'replace') {
                    // Obtener referencias de documentos de la colección de pedidos de la máquina
                    const currentOrders = await getDocs(collection(db, "orders", machineId));
                    currentOrders.forEach(docSnap => batch.delete(docSnap.ref));
                } else if (saveType === 'edit') {
                    // Si es edición, solo actualizamos los documentos existentes
                    Object.values(ordersObject).forEach(order => {
                        if (order.id) {
                            batch.set(doc(db, "orders", machineId, order.id), order, { merge: true });
                        }
                    });
                    await batch.commit();
                    return; // Edición lista, salimos
                }
                
                // Para 'new', 'queue' o 'replace', agregamos el nuevo pedido (o los pedidos)
                Object.values(ordersObject).forEach(order => {
                    const payload = { 
                        ...order, 
                        isNext: saveType === 'queue', // Marcamos si va en cola
                        createdAt: order.createdAt || serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };
                    batch.set(doc(db, "orders", machineId, order.id), payload);
                });
                
                try {
                    await batch.commit();
                    alert(`Pedido guardado como ${saveType === 'queue' ? 'Siguiente' : 'Actual'}.`);
                } catch (error) {
                    console.error("Error saving orders:", error);
                }
            };
            
            const handleDeleteOrder = async (machineId, orderId) => {
                if (!user || ![ROLES.ADMIN, ROLES.DEVELOPMENT].includes(user.role)) return alert('Permiso denegado.');
                try {
                    await deleteDoc(doc(db, "orders", machineId, orderId));
                    alert('Pedido eliminado.');
                } catch (error) {
                    console.error("Error deleting order:", error);
                }
            };

            // Lógica de Promover Pedido (cuando el actual termina)
            const handlePromoteOrder = async (machineId, currentId, nextId) => {
                try {
                    const batch = writeBatch(db);
                    
                    // 1. Eliminar el pedido actual (que ya terminó)
                    batch.delete(doc(db, "orders", machineId, currentId));
                    
                    // 2. Promover el pedido "next" a "current"
                    const nextOrderRef = doc(db, "orders", machineId, nextId);
                    batch.update(nextOrderRef, {
                        isNext: false, // Quitar la marca de "siguiente"
                        startDate: new Date().toISOString().split('T')[0], // Establecer inicio en hoy
                        promotedAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    });
                    
                    await batch.commit();
                    console.log(`Pedido ${nextId} promovido en máquina ${machineId}`);
                } catch (error) {
                    console.error("Error promoting order:", error);
                }
            };

            const handleSaveUser = async (pin, userData) => {
                if (!user || user.role !== ROLES.DEVELOPMENT) return alert('Permiso denegado.');
                try {
                    await setDoc(doc(db, "users", pin), userData, { merge: true });
                    alert(`Usuario ${userData.name} guardado/actualizado.`);
                } catch (error) {
                    console.error("Error saving user:", error);
                }
            };

            const handleDeleteUser = async (pin) => {
                if (!user || user.role !== ROLES.DEVELOPMENT) return alert('Permiso denegado.');
                if (confirm(`¿Estás seguro de eliminar al usuario con PIN ${pin}?`)) {
                    try {
                        await deleteDoc(doc(db, "users", pin));
                        alert('Usuario eliminado.');
                    } catch (error) {
                        console.error("Error deleting user:", error);
                    }
                }
            };

            const handleSaveVisibility = async (machines, days) => {
                if (!user || ![ROLES.ADMIN, ROLES.DEVELOPMENT].includes(user.role)) return alert('Permiso denegado.');
                try {
                    await setDoc(doc(db, "config", "visibility"), { machines, days }, { merge: true });
                    alert('Configuración de visibilidad guardada.');
                } catch (error) {
                    console.error("Error saving visibility:", error);
                }
            };

            // NUEVA FUNCIÓN: Formatear Base de Datos (Borrar producción y pedidos)
            const handleFormatDatabase = async () => {
                if (!user || user.role !== ROLES.DEVELOPMENT) return alert('Permiso denegado.');
                if (!confirm('ADVERTENCIA: ¿Estás SEGURO de formatear la base de datos? Esto ELIMINARÁ todos los datos de producción y pedidos.')) return;
                
                try {
                    const batch = writeBatch(db);
                    
                    // 1. Borrar toda la colección de productionData
                    const productionSnapshot = await getDocs(collection(db, "productionData"));
                    productionSnapshot.forEach(docSnap => batch.delete(docSnap.ref));
                    
                    // 2. Borrar toda la colección de orders
                    const ordersSnapshot = await getDocs(collection(db, "orders"));
                    ordersSnapshot.forEach(docSnap => batch.delete(docSnap.ref));
                    
                    await batch.commit();
                    alert('Base de datos formateada con éxito. Producción y pedidos eliminados.');
                } catch (error) {
                    console.error("Error formatting database:", error);
                    alert('Error al formatear la base de datos. Revisa la consola.');
                }
            };
            
            // NUEVA FUNCIÓN: Descargar Respaldo JSON
            const handleDownloadBackup = () => {
                if (!user || user.role !== ROLES.DEVELOPMENT) return alert('Permiso denegado.');
                
                const backupData = {
                    productionData: data,
                    ordersData: ordersData,
                    usersData: usersData,
                    visibilityConfig: visibilityConfig,
                    timestamp: new Date().toISOString()
                };
                
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `MAES26_Backup_${new Date().toISOString().slice(0, 10)}.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                alert('Respaldo descargado.');
            };

            const handleDaySelect = (index) => {
                // Navegar a la semana del día seleccionado
                const newWeekOffset = Math.floor(index / 7);
                // Si el índice es más de 7 días atrás o adelante del visible, navegamos
                if (Math.abs(newWeekOffset - INITIAL_STATE.weekOffset) > 1) {
                     // Solo ajustamos la semana de inicio para que la vista del calendario se centre en esa semana
                    // No hay estado de `weekOffset` en este código, así que solo usamos el modal de calendario para seleccionar.
                    // Si se desea navegación, se requiere un state global para `weekOffset` en `App`. 
                    // Por simplicidad, solo mostramos el día seleccionado en la consola si no hay state.
                    console.log(`Día seleccionado: ${ALL_ROWS[index].id}`);
                }
                setShowCalendar(false);
            };

            // --- VISTAS ---

            if (!user) {
                return (
                    <div className="flex h-full items-center justify-center bg-slate-900">
                        <div className="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-sm border border-slate-700 animate-zoom-in">
                            <h2 className="text-3xl font-bold text-white mb-6 text-center">MAES26 Control</h2>
                            <p className="text-slate-400 mb-4 text-center">Ingresa tu PIN de 4 dígitos:</p>
                            <input type="password" value={userPin} onChange={e => setUserPin(e.target.value.slice(0, 4))} onKeyDown={e => e.key === 'Enter' && handleLogin()} className="w-full bg-slate-700 text-white p-3 rounded text-center text-3xl password-mask font-black tracking-widest outline-none focus:ring-2 focus:ring-green-500 transition" maxLength="4" autoFocus />
                            <button onClick={handleLogin} disabled={userPin.length !== 4} className="w-full mt-6 py-3 rounded bg-green-600 hover:bg-green-500 text-white font-bold transition disabled:bg-slate-600 disabled:text-slate-400">
                                Iniciar Sesión
                            </button>
                        </div>
                    </div>
                );
            }

            const DesktopView = () => {
                const todayIndex = ALL_ROWS.findIndex(r => r.isoDate === new Date().toISOString().split('T')[0]);
                const visibleMachines = MACHINES.filter(m => !(visibilityConfig.machines || []).includes(m.id));
                const startDayIndex = INITIAL_STATE.weekOffset * 7;
                const endDayIndex = Math.min(ALL_ROWS.length, startDayIndex + 63); // 9 semanas
                const visibleRows = ALL_ROWS.slice(startDayIndex, endDayIndex);
                
                return (
                    <div className="h-full flex flex-col">
                        <NavBar user={user} onLogout={handleLogout} onOpenOrders={() => orderManagerRef.current?.openOrderModal(MACHINES[0].id) || setShowOrderManager(true)} onOpenUsers={() => setShowUserManagementModal(true)} onOpenVisibility={() => setShowVisibilityModal(true)} onOpenReport={() => {}} onFormatDB={handleFormatDatabase} onDownloadBackup={handleDownloadBackup} />
                        
                        <div className="flex-1 overflow-x-auto custom-scrollbar bg-slate-800">
                            <table className="min-w-full divide-y divide-slate-700">
                                <thead className="sticky top-0 bg-slate-900 z-[5]">
                                    <tr>
                                        <th className="sticky left-0 bg-slate-900 z-[6] w-48 text-left p-3 text-xs font-medium text-slate-400 uppercase tracking-wider border-r border-slate-700">Máquina</th>
                                        {visibleRows.map(row => (
                                            <th key={row.id} className={`p-3 text-center text-xs font-medium uppercase tracking-wider w-24 ${row.index === todayIndex ? 'bg-green-800/50 text-green-300 border-green-700' : (row.shortDay === 'DOM' ? 'bg-red-900/50 text-red-300' : 'text-slate-400')} ${(visibilityConfig.days || []).includes(row.id) ? 'line-through opacity-50' : ''}`}>
                                                <div className="font-bold">{row.shortDay} {row.dateNum}</div>
                                                <div className="text-[10px]">{row.month}</div>
                                                <div className="planning-info">{getWeekLabel(ALL_ROWS.slice(row.index - (row.index % 7), row.index - (row.index % 7) + 7))}</div>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="bg-slate-800 divide-y divide-slate-700">
                                    {visibleMachines.map(machine => {
                                        const machineOrders = ordersData[machine.id] || {};
                                        const currentOrder = machineOrders.current;
                                        const nextOrder = machineOrders.next;
                                        const metrics = calculateOrderMetrics(machine.id, currentOrder, data, ALL_ROWS, visibilityConfig.days || []);
                                        
                                        // Si el pedido actual terminó, lo marcamos
                                        const isCompleted = metrics.status === 'COMPLETADO';
                                        
                                        return (
                                            <tr key={machine.id} className={(visibilityConfig.machines || []).includes(machine.id) ? 'hidden' : ''}>
                                                <td className="sticky left-0 bg-slate-900 z-40 p-3 whitespace-nowrap text-sm font-medium border-r border-slate-700">
                                                    <div className="flex items-center gap-2">
                                                        <div onClick={() => orderManagerRef.current.openOrderModal(machine.id)} className={`machine-circle w-10 h-10 rounded-full flex items-center justify-center cursor-pointer text-white font-black text-xs ${currentOrder ? (isCompleted ? 'bg-yellow-600 hover:bg-yellow-500' : 'bg-green-600 hover:bg-green-500') : 'bg-slate-700 hover:bg-slate-600'}`}>
                                                            {machine.name.replace('MAQ ', '')}
                                                        </div>
                                                        <div>
                                                            <p className="text-white font-bold text-sm">{machine.name}</p>
                                                            {currentOrder ? (
                                                                <div className={`text-[10px] font-bold mt-0.5 px-1 rounded ${isCompleted ? 'bg-yellow-800 text-yellow-300' : (metrics.deviation < 0 ? 'bg-red-800 text-red-300' : 'bg-green-800 text-green-300')}`} onClick={() => setShowReportModal({ machineId: machine.id, order: currentOrder, metrics: metrics })}>
                                                                    {currentOrder.model} ({metrics.progress.toFixed(0)}%)
                                                                </div>
                                                            ) : (
                                                                <p className="text-[10px] text-slate-500 italic">Sin Pedido</p>
                                                            )}
                                                            {nextOrder && (<p className="text-[10px] text-yellow-400 italic">Cola: {nextOrder.model}</p>)}
                                                        </div>
                                                    </div>
                                                </td>
                                                {visibleRows.map(row => {
                                                    const isHidden = (visibilityConfig.days || []).includes(row.id);
                                                    const isToday = row.index === todayIndex;
                                                    const rowData = data[row.id]?.[machine.id] || { slots: [{}, {}], actual: 0 };
                                                    
                                                    // Determinar el color de fondo para la celda
                                                    let cellBg = '';
                                                    let isOrderDay = false;
                                                    
                                                    if (currentOrder && row.isoDate >= currentOrder.startDate) {
                                                        isOrderDay = true;
                                                        if (isCompleted) {
                                                            // Pedido terminado
                                                            cellBg = 'bg-yellow-900/30';
                                                        } else if (metrics.deviation < 0 && row.isoDate <= new Date().toISOString().split('T')[0]) {
                                                            // Atraso y día pasado/hoy
                                                            cellBg = 'bg-red-900/30';
                                                        } else if (isToday) {
                                                            cellBg = 'bg-blue-900/30';
                                                        } else {
                                                            // En curso / Planeado
                                                            cellBg = 'bg-slate-800';
                                                        }
                                                    } else if (nextOrder && row.isoDate >= nextOrder.startDate) {
                                                        // Pedido en cola, solo planificación futura
                                                        cellBg = 'bg-slate-800/50 border-dashed border-slate-700';
                                                    } else if (row.shortDay === 'DOM' || isHidden) {
                                                        cellBg = 'bg-slate-900/50';
                                                    }
                                                    
                                                    return (
                                                        <td key={row.id} className={`p-1 w-24 align-top ${row.index === todayIndex ? 'border-2 border-green-500' : 'border border-slate-700'} ${cellBg} transition duration-150`}>
                                                            <div className={`h-24 flex flex-col justify-between ${isOrderDay ? '' : 'opacity-40 pointer-events-none'}`}>
                                                                <div className="flex-1 space-y-1">
                                                                    {/* Slot 1: OPERADOR A (o Gral) */}
                                                                    <ProductionSlot 
                                                                        slotData={rowData.slots[0]} 
                                                                        index={0} 
                                                                        disabled={isHidden || !currentOrder} 
                                                                        onUpdate={(i, f, v) => handleUpdateSlot(machine.id, row.id, i, f, v)} 
                                                                    />
                                                                    {/* Slot 2: OPERADOR B */}
                                                                    <ProductionSlot 
                                                                        slotData={rowData.slots[1]} 
                                                                        index={1} 
                                                                        disabled={isHidden || !currentOrder} 
                                                                        onUpdate={(i, f, v) => handleUpdateSlot(machine.id, row.id, i, f, v)} 
                                                                    />
                                                                </div>
                                                                {currentOrder && (
                                                                    <div className="mt-1 text-center">
                                                                        <span className={`text-xs font-bold px-1 rounded ${rowData.actual > metrics.dailyCapacity * 1.05 ? 'bg-red-500/50' : 'bg-slate-600'}`}>{rowData.actual || 0} pzas</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const MobileView = () => { /* Simplified mobile view */ return (<div className="p-4 text-center">Modo Móvil No Soportado. Usa un dispositivo con vista de Escritorio.</div>); };

            return (
                <div className="h-full relative">
                    {showOrderManager && <OrderManager ref={orderManagerRef} onClose={() => setShowOrderManager(false)} onSaveOrders={handleSaveOrder} onDeleteOrder={handleDeleteOrder} ordersData={ordersData} allProductionData={data} allRows={ALL_ROWS} hiddenDays={visibilityConfig.days || []} />}
                    {showVisibilityModal && <VisibilityModal onClose={() => setShowVisibilityModal(false)} currentHiddenMachines={visibilityConfig.machines || []} currentHiddenDays={visibilityConfig.days || []} onSaveVisibility={handleSaveVisibility} allRows={ALL_ROWS} />}
                    {showCalendar && <CalendarModal onClose={() => setShowCalendar(false)} onSelectDate={handleDaySelect} allRows={ALL_ROWS} />}
                    {user?.canManageUsers && showUserManagementModal && <UserManagementModal onClose={() => setShowUserManagementModal(false)} users={usersData} onSaveUser={handleSaveUser} onDeleteUser={handleDeleteUser} />}
                    {showReportModal && <ReportModal onClose={() => setShowReportModal(null)} machineId={showReportModal.machineId} order={showReportModal.order} metrics={showReportModal.metrics} onPromote={showReportModal.order.id === ordersData[showReportModal.machineId]?.current?.id && ordersData[showReportModal.machineId]?.next ? () => handlePromoteOrder(showReportModal.machineId, showReportModal.order.id, ordersData[showReportModal.machineId].next.id) : null} />}
                    
                    <div className="block md:hidden h-full"><MobileView /></div>
                    <div className="hidden md:block h-full"><DesktopView /></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
