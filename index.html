            "name": "Sistema Textil Cloud",

            "background_color": "#f1f5f9",

                "sizes": "192x192",
                "type": "image/png"
            }]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const firebaseConfig = {

        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const Icon = ({ name, size = 18, className }) => <i data-lucide={name} width={size} height={size} className={className}></i>;
        const toUppercase = (handler) => (e) => { e.target.value = e.target.value.toUpperCase(); handler(e); };
        
        // --- UTILIDADES DE FECHA Y PARTIDA ---
        const MONTHS = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
        
        const getPartidaCodes = (dateStr, sequence, pieces) => {
            if(!dateStr) return { base: '???', suffix: '' };
            const date = new Date(dateStr); // Cuidado con zona horaria, usaremos input date string directo
            const [y, m, d] = dateStr.split('-'); 
            const monthCode = MONTHS[parseInt(m) - 1];
            const yearCode = y.substring(2);
            const seqCode = sequence.toString().padStart(2, '0');
            
            const base = `${monthCode}${yearCode}${seqCode}`;
            
            // Generar sufijos únicos
            const uniqueAbbrs = [...new Set(pieces.map(p => p.abbr || p.pieza.substring(0,2).toUpperCase()))];
            const suffix = uniqueAbbrs.map(a => `/${a}`).join('');
            
            return { base, suffix, full: base + suffix };
        };

        const generateSmartID = (partida, pieces, maquina) => {
             // ID interno para base de datos
            return `${partida}-M${maquina}-${Date.now()}`;
        };

        const generatePackages = (pieces, packageSize, partidaBase) => {
            let packages = [];
            let globalCounter = 1;
            
            pieces.forEach(p => {
                const total = Number(p.totalPedido) || 0;
                const size = Number(packageSize) || total;
                const n = Math.ceil(total / size);
                const abbr = p.abbr || p.pieza.substring(0, 2).toUpperCase();

                for (let i = 1; i <= n; i++) {
                    const cantidad = (i === n) ? (total % size || size) : size;
                    // NUEVO FORMATO: ENE2601-01/10BL
                    const codigoUnico = `${partidaBase}-${i.toString().padStart(2,'0')}/${n}${abbr}`; 
                    
                    packages.push({ 
                        id: Date.now() + Math.random() + globalCounter, 
                        piezaNombre: p.pieza, 
                        piezaAbbr: abbr,
                        cantidad: cantidad, 
                        paqueteNum: i, 
                        paquetesDePieza: n, 
                        codigoUnico: codigoUnico,
                        finished: false,
                        observaciones: '',
                        programa: p.programa || '' // Agregamos el programa al paquete
                    });
                    globalCounter++;
                }
            });
            return packages;
        };
        
        // Función auxiliar para convertir imagen a base64
        const imageUrlToBase64 = (url) => new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; 
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/jpeg').replace(/^data:image\/(png|jpeg);base64,/, ""));
            };
            img.onerror = reject;
            img.src = url;
        });

        // --- EXPORTACIÓN DE DATOS ---
        const ExportOptions = ({ order, config }) => {
            
            const packagesData = order.progreso.map(p => ({
                'CÓDIGO ÚNICO': p.codigoUnico,
                'PIEZA': p.piezaNombre,
                'CANTIDAD': p.cantidad,
                'PAQUETE_NUM': p.paqueteNum,
                'PAQUETES_TOTAL': p.paquetesDePieza,
                'TERMINADO': p.finished ? 'SI' : 'NO',
                'TEJEDOR': p.tejedor || '',
                'FECHA_REGISTRO': p.fecha || '',
                'OBSERVACIONES': p.observaciones || '',
                'PROGRAMA': p.programa || ''
            }));

            const excelData = [
                ['RESUMEN DE ORDEN'],
                ['CLIENTE', order.cliente],
                ['MODELO', order.codigo],
                ['PARTIDA', order.partidaFull],
                ['MÁQUINA', order.maquina],
                ['FECHA ENTREGA', order.deliveryDate],
                ['TOTAL PIEZAS', order.totalPedido],
                [''],
                ['DETALLE DE PAQUETES'],
                Object.keys(packagesData[0] || {}),
                ...packagesData.map(p => Object.values(p))
            ];

            const handleExportCSV = () => {
                const csvContent = excelData.map(e => e.join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                saveAs(blob, `Orden_${order.partidaBase}.csv`);
            };

            const handleExportExcel = () => {
                const ws = XLSX.utils.aoa_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Orden Detalle");
                XLSX.writeFile(wb, `Orden_${order.partidaBase}.xlsx`);
            };

            const handleExportPDF = () => {
                 window.print();
            };

            const handleExportWord = async () => {
                const today = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                
                // 1. Intentar obtener la imagen en Base64
                let imageBase64 = '';
                const baseRepoUrl = config.repoUrls && config.repoUrls[0];
                if (baseRepoUrl && order.codigo) {
                    try {
                        const baseUrl = baseRepoUrl.endsWith('/') ? baseRepoUrl : baseRepoUrl + '/';
                        const imageUrl = `${baseUrl}${order.codigo}.jpg`; 
                        imageBase64 = await imageUrlToBase64(imageUrl);
                    } catch (error) {
                        console.warn("No se pudo cargar la imagen para Word. Intentando con PNG...");
                        try {
                            const baseUrl = baseRepoUrl.endsWith('/') ? baseRepoUrl : baseRepoUrl + '/';
                            const imageUrl = `${baseUrl}${order.codigo}.png`; 
                            imageBase64 = await imageUrlToBase64(imageUrl);
                        } catch (e) {
                            console.warn("No se pudo cargar la imagen PNG.");
                        }
                    }
                }

                // 2. Preparar los datos para el template
                const piecesSummary = order.subPiecesData.map(p => ({
                    pieza_desc: p.programa ? `${p.programa} / ${p.pieza} (${p.abbr})` : `${p.pieza} (${p.abbr})`,
                    talla: p.talla,
                    total: p.totalPedido,
                }));

                const packagesList = packagesData.map(p => ({
                    id: p.CÓDIGO_ÚNICO,
                    qty: p.CANTIDAD,
                    pieza: p.PIEZA,
                    estado: p.TERMINADO,
                    tejedor: p.TEJEDOR || 'PENDIENTE',
                }));

                const threadingList = order.threading.map(t => ({
                    guia: t.guia,
                    material: t.material,
                    porcentaje: t.porcentaje,
                }));

                const docData = {
                    cliente: order.cliente,
                    modelo: order.codigo,
                    partida: order.partidaFull,
                    maquina: order.maquina,
                    entrega: order.deliveryDate,
                    fecha_hoy: today,
                    piezas: piecesSummary,
                    paquetes: packagesList,
                    enhebrado: threadingList,
                    has_image: !!imageBase64,
                    image_base64: imageBase64,
                    image_width: 300, 
                    image_height: 300, 
                };

                // 3. Crear el template (simulado)
                // NOTA: Para un uso real, necesitarías un template DOCX base para merge (ejs. un archivo .docx subido aquí)
                // Como no puedo cargar archivos, crearemos uno SIMPLE en la marcha para demostrar la funcionalidad.
                const generateDocxTemplate = (data) => {
                    let content = `
                        # ORDEN DE PRODUCCIÓN - ${data.partida}

                        ## Datos Generales
                        - Cliente: **${data.cliente}**
                        - Modelo: **${data.modelo}**
                        - Máquina: **${data.maquina}**
                        - Fecha de Entrega: **${data.entrega}**
                        - Exportado: ${data.fecha_hoy}
                        
                        ## Imagen del Modelo
                    `;
                    
                    if (data.has_image) {
                        content += ``; 
                    } else {
                        content += `- No hay imagen disponible -`;
                    }
                    
                    content += `
                        ## Piezas (Programa / Descripción / Pieza)
                        | Pieza | Talla | Total |
                        | :--- | :---: | ---: |
                    `;
                    data.piezas.forEach(p => {
                        content += `| ${p.pieza_desc} | ${p.talla} | ${p.total} |\n`;
                    });

                    content += `
                        ## Enhebrado
                        | Guía | Material | % |
                        | :---: | :--- | :---: |
                    `;
                    data.enhebrado.forEach(t => {
                        content += `| ${t.guia} | ${t.material} | ${t.porcentaje} |\n`;
                    });

                    content += `
                        ## Paquetes (Control de Avance)
                        | Código Único | Cantidad | Pieza | Estado | Tejedor |
                        | :--- | :---: | :--- | :--- | :--- |
                    `;
                    data.paquetes.forEach(p => {
                        content += `| ${p.id} | ${p.qty} | ${p.pieza} | **${p.estado}** | ${p.tejedor} |\n`;
                    });
                    
                    // Convertir la cadena Markdown simple a un Blob DOCX (usando Docxtemplater requeriría un archivo .docx binario, esta es una simplificación)
                    // Para hacer un DOCX real con la imagen incrustada, la librería es necesaria.
                    // Si el usuario presiona este botón, asumiremos que tiene el template base binario o usará la vista PDF. 
                    // Ya que no puedo manipular archivos binarios aquí, simularé la descarga de un DOCX, pero con la complejidad del texto y la imagen.

                    alert("El exportador DOCX real requiere un template binario DOCX para incrustar la imagen. Se recomienda usar la opción PDF/Imprimir o Excel por ahora. Si desea continuar, le proporcionaré un archivo TXT con el contenido formateado.");
                    const docxBlob = new Blob([content], { type: 'text/plain;charset=utf-8;' });
                    saveAs(docxBlob, `Orden_${order.partidaBase}_Word_Simulado.txt`); // Cambiado a TXT
                
                /*
                // Código real para Docxtemplater (requiere template.docx en el mismo origen)
                
                try {
                    const response = await fetch('template.docx'); // Reemplazar con la ruta de tu template
                    const buffer = await response.arrayBuffer();
                    const zip = new PizZip(buffer);
                    const doc = new docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                    
                    doc.setData(docData);
                    doc.render(); 

                    const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                    saveAs(out, `Orden_${order.partidaBase}.docx`);

                } catch (error) {
                    console.error("Error al generar DOCX:", error);
                    alert("Error al generar DOCX. Verifique el template y la consola.");
                }
                */
            };

            return (
                <div className="flex gap-2">
                    <div className="relative group">
                        <button className="bg-slate-900 text-white px-3 py-1 rounded font-bold text-xs flex items-center gap-1 hover:bg-slate-700" onClick={e=>e.currentTarget.nextElementSibling.classList.toggle('hidden')}>
                            <Icon name="download"/> EXPORTAR
                        </button>
                        <div className="absolute top-full right-0 mt-1 bg-white border rounded shadow-lg hidden z-20 w-40">
                            <button onClick={handleExportPDF} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><Icon name="file-text" size={16}/> PDF (Imprimir)</button>
                            <button onClick={handleExportExcel} className="w-full text-left px-3 py-2 text-sm text-green-600 hover:bg-green-50 flex items-center gap-2"><Icon name="file-spreadsheet" size={16}/> Excel (XLSX)</button>
                            <button onClick={handleExportCSV} className="w-full text-left px-3 py-2 text-sm text-blue-600 hover:bg-blue-50 flex items-center gap-2 border-t"><Icon name="file-text" size={16}/> CSV</button>
                            <button onClick={handleExportWord} className="w-full text-left px-3 py-2 text-sm text-indigo-600 hover:bg-indigo-50 flex items-center gap-2 border-t"><Icon name="file-text" size={16}/> Word (DOCX)</button>
                        </div>
                    </div>
                </div>
            );
        };
        
        // --- DASHBOARD COMPONENTS ---
        const MachineCard = ({ maquina, orders }) => {
            const [is24Hours, setIs24Hours] = useState(true);
            const pendingPackages = useMemo(() => {
                let pkgs = [];
                orders.forEach(o => {
                    const incomplete = o.progreso?.filter(p => !p.finished) || [];
                    incomplete.forEach(p => {
                        const pieceData = o.subPiecesData?.find(sp => sp.pieza === p.piezaNombre) || o;
                        const timePerPiece = Number(pieceData.tiempo) || 0;
                        pkgs.push({ ...p, parentOrderId: o.id, orderCode: o.codigo, partida: o.partidaBase, timeTotal: (p.cantidad * timePerPiece) });
                    });
                });
                return pkgs; 
            }, [orders]);

            const updateObs = async (pkgId, parentOrderId, newVal) => {
                const order = orders.find(o => o.id === parentOrderId);
                if(!order) return;
                const newProgreso = order.progreso.map(p => p.id === pkgId ? {...p, observaciones: newVal} : p);
                await db.collection('orders').doc(String(parentOrderId)).update({progreso: newProgreso});
            };

            const totalMinutesLeft = pendingPackages.reduce((sum, p) => sum + p.timeTotal, 0);
            const hoursPerDay = 12; // Ahora siempre calculamos por el turno de 12 horas
            const daysLeft = totalMinutesLeft > 0 ? (totalMinutesLeft / 60 / hoursPerDay).toFixed(1) : 0;
            const hoursLeft = (totalMinutesLeft / 60).toFixed(1);

            return (
                <div className="machine-card shadow-lg border border-slate-600">
                    <div className="flex justify-between items-center border-b border-slate-500 pb-2 mb-2">
                        <div>
                            <div className="text-xs text-slate-400 font-bold uppercase">Máquina</div>
                            <div className="text-3xl font-black text-yellow-400">#{maquina}</div>
                        </div>
                        <div className="text-right">
                            {/* <button onClick={()=>setIs24Hours(!is24Hours)} className="bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-[10px] font-bold mb-1 border border-slate-500 block w-full">
                                {is24Hours ? '24 HORAS' : '12 HORAS'}
                            </button> */}
                            <div className="text-xs font-bold text-green-400">{daysLeft} días ({hoursLeft}h)</div>
                        </div>
                    </div>
                    <div className="pkg-list space-y-1">
                        {pendingPackages.length === 0 && <div className="text-center text-slate-500 text-xs py-4">Máquina Libre</div>}
                        {pendingPackages.map((p, i) => (
                            <div key={i} className="bg-slate-800 p-2 rounded flex gap-2 items-center text-xs border border-slate-700">
                                <div className="font-black text-white text-lg w-10 text-right shrink-0">{p.cantidad}</div>
                                <div className="w-24 shrink-0 overflow-hidden">
                                    <div className="font-bold text-slate-300 truncate text-[10px]" title={p.piezaNombre}>{p.piezaNombre}</div>
                                    <div className="text-[9px] text-yellow-500 font-black truncate">{p.partida}</div>
                                </div>
                                <div className="flex-grow pl-2 border-l border-slate-600">
                                    <input className="obs-input placeholder-slate-600" placeholder="Observaciones..." defaultValue={p.observaciones || ''} onBlur={(e) => updateObs(p.id, p.parentOrderId, e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') e.target.blur(); }}/>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DashboardBottom = ({ activeOrders }) => {
            const machineGroups = useMemo(() => {
                const groups = {};
                activeOrders.forEach(o => { if(!groups[o.maquina]) groups[o.maquina] = []; groups[o.maquina].push(o); });
                return Object.keys(groups).sort((a,b) => parseInt(a)-parseInt(b)).map(k => ({ id: k, orders: groups[k] }));
            }, [activeOrders]);

            return (
                <div className="bottom-pane shadow-inner">
                    {machineGroups.map(g => <MachineCard key={g.id} maquina={g.id} orders={g.orders} />)}
                    {machineGroups.length === 0 && <div className="text-slate-500 w-full flex items-center justify-center font-bold">No hay producción activa</div>}
                </div>
            );
        };

        // --- SMART IMAGE ---
        const SmartImage = ({ repoUrls, codigo, className }) => {
            const [imgSrc, setImgSrc] = useState(null);
            const [attempt, setAttempt] = useState({ urlIndex: 0, extension: 'jpg' });
            useEffect(() => {
                if (!repoUrls || !repoUrls.length || !codigo) { setImgSrc(null); return; }
                setAttempt({ urlIndex: 0, extension: 'jpg' });
                const base = repoUrls[0].endsWith('/') ? repoUrls[0] : repoUrls[0] + '/';
                setImgSrc(`${base}${codigo}.jpg`);
            }, [repoUrls, codigo]);

            const handleError = () => {
                const { urlIndex, extension } = attempt;
                if (extension === 'jpg') {
                    const base = repoUrls[urlIndex].endsWith('/') ? repoUrls[urlIndex] : repoUrls[urlIndex] + '/';
                    setImgSrc(`${base}${codigo}.png`);
                    setAttempt({ ...attempt, extension: 'png' });
                } else if (urlIndex < repoUrls.length - 1) {
                    const nextIdx = urlIndex + 1;
                    const base = repoUrls[nextIdx].endsWith('/') ? repoUrls[nextIdx] : repoUrls[nextIdx] + '/';
                    setImgSrc(`${base}${codigo}.jpg`);
                    setAttempt({ urlIndex: nextIdx, extension: 'jpg' });
                } else {
                    setAttempt({ ...attempt, extension: 'fail' });
                }
            };
            if (attempt.extension === 'fail' || !imgSrc) return <div className={`bg-slate-100 flex flex-col items-center justify-center text-slate-300 ${className}`}><Icon name="image-off" size={48} className="mb-2"/><span className="text-[10px] text-center px-2">No imagen</span></div>;
            return <img src={imgSrc} onError={handleError} className={className} />;
        };

        // --- FORMULARIO DE ORDEN (NUEVA LÓGICA DE PARTIDAS) ---
        const MultiOrderForm = ({ config, onCancel, initialOrder, clientHistory, inventory, isEditing }) => {
            // Estado inicial para encabezado
            const [header, setHeader] = useState({ 
                codigo: initialOrder?.codigo || '', 
                cliente: initialOrder?.cliente || '', 
                maquina: initialOrder?.maquina || '', 
                deliveryDate: initialOrder?.deliveryDate || '', 
                sequence: initialOrder?.sequence || '01'
            });

            const [pieces, setPieces] = useState(initialOrder?.subPiecesData || [{ id: 1, pieza: 'BLUSA', abbr: 'BL', talla: 'UNITALLA', totalPedido: 100, peso: '', tiempo: '', programa: '' }]); // Agregado: programa
            const [threadingData, setThreadingData] = useState(initialOrder?.threading || []);
            const predefinedPackages = initialOrder?.predefinedPackages || (initialOrder && initialOrder.packageSize === 'VARIO' ? initialOrder.progreso : null);
            const [packageSize, setPackageSize] = useState(initialOrder?.packageSize && initialOrder.packageSize !== 'VARIO' ? initialOrder.packageSize : 50);
            
            // Función para calcular la partida en tiempo real
            const computedPartida = useMemo(() => {
                return getPartidaCodes(header.deliveryDate, header.sequence, pieces);
            }, [header.deliveryDate, header.sequence, pieces]);

            const addPiece = () => setPieces([...pieces, { id: Date.now(), pieza: '', abbr: '', talla: 'UNITALLA', totalPedido: '', peso: '', tiempo: '', programa: '' }]);
            
            const updatePiece = (id, f, v) => {
                setPieces(pieces.map(p => {
                    if (p.id !== id) return p;
                    const newP = { ...p, [f]: v };
                    // Auto-generar abreviatura si cambia el nombre y no tiene una manual
                    if (f === 'pieza' && v.length >= 2 && f !== 'abbr') { // No modificar abbr si la edita directamente
                        newP.abbr = v.substring(0, 2).toUpperCase();
                    }
                    if(f === 'programa' || f === 'pieza') { // Asegurar mayúsculas para programa y pieza
                         newP[f] = v.toUpperCase();
                    }
                    return newP;
                }));
            };
            
            const removePiece = (id) => pieces.length > 1 && setPieces(pieces.filter(p => p.id !== id));
            const inventoryKeys = inventory ? Object.keys(inventory) : [];

            const handleSubmit = async () => {
                if(!header.codigo || !header.cliente || !header.maquina || !header.deliveryDate) return alert("Faltan datos (Fecha entrega, modelo, etc).");
                
                let finalPackages = initialOrder?.progreso?.filter(p => p.finished) || []; 
                
                // Si estamos editando y ya existen paquetes, cuidado con regenerar todo
                if (!predefinedPackages) {
                    // Generar nuevos paquetes con la NUEVA nomenclatura
                    const newPackages = generatePackages(pieces, packageSize, computedPartida.base);
                    
                    if(isEditing) {
                        // Si se edita, intentamos mantener los terminados y añadir nuevos si aumentó la cantidad
                        // *NOTA SIMPLIFICADA*: Si cambias la lógica de nombres, lo ideal es regenerar los pendientes.
                        const finishedIds = new Set(finalPackages.map(p=>p.id));
                        // Filtramos los nuevos que no conflicteen (en un caso real es complejo, aquí regeneramos los pendientes)
                         finalPackages = [...finalPackages, ...newPackages.filter(p=>!finishedIds.has(p.id))];
                    } else {
                         finalPackages = newPackages;
                    }
                }

                const displayId = generateSmartID(computedPartida.full, pieces, header.maquina);
                const creationDate = isEditing 
                    ? (initialOrder.createdAt || new Date().toLocaleString('es-MX')) 
                    : new Date().toLocaleString('es-MX');

                const orderPayload = { 
                    ...header, 
                    partidaBase: computedPartida.base,    // ENE2601
                    partidaSuffix: computedPartida.suffix, // /BL/ML
                    partidaFull: computedPartida.full,     // ENE2601/BL/ML
                    id: isEditing ? initialOrder.id : Date.now(), 
                    displayId, 
                    subPiecesData: pieces.map(p => ({...p, totalPedido: Number(p.totalPedido)})), 
                    progreso: finalPackages, 
                    threading: threadingData, 
                    packageSize: predefinedPackages ? 'VARIO' : Number(packageSize), 
                    status: initialOrder?.status || 'EN PROCESO', 
                    totalPedido: pieces.reduce((a,b)=>a+Number(b.totalPedido),0),
                    createdAt: creationDate
                };

                try { 
                    await db.collection('orders').doc(String(orderPayload.id)).set(orderPayload);
                    alert(`Orden ${isEditing ? 'Actualizada' : 'Guardada'}`);
                    onCancel(); 
                } catch(e) { 
                    console.error(e);
                    alert("Error al guardar"); 
                }

                        <div className="col-span-5"><label className="text-xs font-bold">CLIENTE</label><input list="clients" value={header.cliente} onChange={toUppercase(e=>setHeader({...header, cliente:e.target.value}))} className="w-full border p-2 rounded font-bold"/><datalist id="clients">{clientHistory.map(c=><option key={c} value={c}/>)}</datalist></div>

                    </div>

                    <div className="mb-4 bg-slate-50 p-3 rounded">

                        {pieces.map((p, i) => (
                            <div key={p.id} className="grid grid-cols-12 gap-2 mb-2 items-end border-b pb-2">
                                <div className="col-span-3"><label className="text-[10px] font-bold">Programa</label><input value={p.programa} onChange={toUppercase(e=>updatePiece(p.id,'programa',e.target.value))} className="w-full border p-1 rounded font-bold text-sm" placeholder="EJ: N8888"/></div>
                                <div className="col-span-3"><label className="text-[10px] font-bold">Nombre</label><input value={p.pieza} onChange={toUppercase(e=>updatePiece(p.id,'pieza',e.target.value))} className="w-full border p-1 rounded font-bold text-sm" placeholder="EJ: BLUSA"/></div>
                                <div className="col-span-1"><label className="text-[10px] font-bold">Abr</label><input value={p.abbr} onChange={toUppercase(e=>updatePiece(p.id,'abbr',e.target.value))} className="w-full border p-1 rounded font-mono text-center bg-yellow-50" placeholder="BL"/></div>
                                <div className="col-span-1"><label className="text-[10px] font-bold">Talla</label><input value={p.talla} onChange={toUppercase(e=>updatePiece(p.id,'talla',e.target.value))} className="w-full border p-1 rounded text-xs"/></div>
                                <div className="col-span-2"><label className="text-[10px] font-bold">Total Pzs</label><input type="number" value={p.totalPedido} onChange={e=>updatePiece(p.id,'totalPedido',e.target.value)} className="w-full border p-1 font-bold text-indigo-700" disabled={!!predefinedPackages}/></div>
                                <div className="col-span-1"><label className="text-[10px] font-bold">Min/Pza</label><input type="number" value={p.tiempo} onChange={e=>updatePiece(p.id,'tiempo',e.target.value)} className="w-full border p-1 bg-yellow-50 font-bold"/></div>
                                <div className="col-span-1 text-center"><button onClick={()=>removePiece(p.id)} className="text-red-500" disabled={!!predefinedPackages}><Icon name="x"/></button></div>
                            </div>

                    <div className="p-8 print:p-0">
                        {order.status === 'ARCHIVADO' && <div className="bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-4 mb-4 font-bold text-center no-print">ESTA ORDEN ESTÁ ARCHIVADA / TERMINADA</div>}

                        <div className="print-section-top">

                                    <h1 className="text-4xl font-black uppercase tracking-tighter">{order.cliente}</h1>
                                    <div className="flex items-baseline mt-1">
                                        <span className="text-sm font-bold mr-2">PARTIDA:</span>
                                        {/* AQUI ESTA LA MAGIA DE LOS TAMAÑOS */}
                                        <span className="text-3xl font-black">{displayBase}</span>
                                        <span className="text-lg font-normal text-slate-500 ml-1 tracking-tighter">{displaySuffix}</span>
                                    </div>
                                    <div className="text-sm font-bold text-slate-600 mt-1">MODELO: {order.codigo}</div>
                                </div>
                                <div className="text-right">
                                    <span className="bg-black text-white px-2 py-1 text-sm font-bold uppercase">MÁQUINA</span>
                                    <div className="text-6xl font-black leading-none">{order.maquina}</div>
                                </div>

                             <div className="flex gap-2 flex-grow overflow-hidden">

                                                    <td className="p-3">{p.finished ? <span className="text-green-600 font-bold bg-green-100 px-2 py-1 rounded-full text-[10px]">LISTO ({p.tejedor})</span> : <span className="text-slate-400 font-medium">PENDIENTE</span>}</td>
                                                    <td className="p-3">{!p.finished 
                                                        ? <button onClick={()=>markPackage(p.id)} disabled={!entry.tejedor} className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded font-bold hover:bg-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed transition">Registrar</button>
                                                        : <button onClick={()=>unmarkPackage(p.id)} className="bg-red-100 text-red-700 px-3 py-1 rounded font-bold hover:bg-red-200 transition">Deshacer</button>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ThreadingEditor = ({ data, onChange, inventoryKeys }) => {
            const addRow = () => onChange([...data, { id: Date.now(), guia: '', material: '', sis: '', porcentaje: '' }]);
            const updateRow = (id, field, val) => onChange(data.map(r => r.id === id ? { ...r, [field]: val } : r));
            const removeRow = (id) => onChange(data.filter(r => r.id !== id));
            return (
                <div className="border rounded bg-white overflow-hidden my-4">
                    <div className="bg-slate-200 p-2 text-xs font-bold flex justify-between"><span>TABLA DE ENHEBRADO</span><button onClick={addRow} className="text-indigo-600 font-bold">+ Fila</button></div>
                    <table className="w-full text-xs text-left">
                        <thead className="bg-slate-50"><tr><th className="p-2 w-16">GUÍA</th><th className="p-2">MATERIAL</th><th className="p-2 w-16 text-center">%</th><th></th></tr></thead>
                        <tbody>{data.map((row) => (<tr key={row.id}><td className="p-1"><input className="w-full border rounded p-1" placeholder="#" value={row.guia} onChange={toUppercase(e=>updateRow(row.id,'guia',e.target.value))} /></td><td className="p-1"><input list="inv" className="w-full border rounded p-1" value={row.material} onChange={toUppercase(e=>updateRow(row.id,'material',e.target.value))} /></td><td className="p-1"><input className="w-full border rounded p-1 text-center" value={row.porcentaje} onChange={e=>updateRow(row.id,'porcentaje',e.target.value)} /></td><td className="p-1"><button onClick={()=>removeRow(row.id)} className="text-red-400"><Icon name="x" size={14}/></button></td></tr>))}</tbody>
                    </table>
                    <datalist id="inv">{inventoryKeys.map(k=><option key={k} value={k}/>)}</datalist>
                </div>
            );
        };

        const SettingsModal = ({ config, onClose, onOpenPrintConfig }) => {
            const [localUrls, setLocalUrls] = useState(config.repoUrls || []);
            const [newUrl, setNewUrl] = useState('');
            const save = async () => { await db.collection('settings').doc('config').set({ ...config, repoUrls: localUrls }); onClose(); };
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                    <div className="bg-white p-6 rounded w-96 shadow-xl">
                        <h3 className="font-bold mb-4 text-lg">Configuración General</h3>
                        
                        <div className="mb-4">
                            <label className="text-xs font-bold block mb-1">Repositorios de Imágenes</label>
                            <div className="mb-2 max-h-40 overflow-y-auto bg-slate-50 border rounded p-1">
                                {localUrls.map((u,i)=><div key={i} className="text-xs truncate mb-1 border-b last:border-0 p-1 flex justify-between"><span>{u}</span><button onClick={()=>setLocalUrls(localUrls.filter((_,x)=>x!==i))} className="text-red-500 font-bold">X</button></div>)}
                            </div>
                            <div className="flex gap-2">
                                <input value={newUrl} onChange={e=>setNewUrl(e.target.value)} className="border p-1 flex-1 text-xs rounded" placeholder="URL GitHub Raw"/>
                                <button onClick={()=>{if(newUrl)setLocalUrls([...localUrls,newUrl]);setNewUrl('')}} className="bg-blue-100 text-blue-700 px-2 font-bold rounded">+</button>
                            </div>
                        </div>

                        <hr className="my-4"/>
                        <button onClick={onOpenPrintConfig} className="w-full mb-4 bg-indigo-100 text-indigo-800 py-2 rounded font-bold text-sm flex items-center justify-center gap-2 hover:bg-indigo-200">
                            <Icon name="printer" size={16}/> CONFIGURAR IMPRESIÓN
                        </button>

                        <div className="flex gap-2">
                            <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-800 py-2 rounded font-bold">Cancelar</button>
                            <button onClick={save} className="flex-1 bg-slate-900 text-white py-2 rounded font-bold">Guardar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PrintConfigModal = ({ currentConfig, onClose }) => {
            const [conf, setConf] = useState(currentConfig || { reportTitle: 'CONTROL DE TEJIDO', footerText: 'SISTEMA TEXTIL CLOUD', showEfficiency: true });

            const handleSave = async () => {
                try {
                    await db.collection('settings').doc('print').set(conf);
                    alert("Configuración de impresión guardada.");
                    onClose();
                } catch(e) { alert("Error al guardar: " + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4">
                    <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
                        <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-lg flex items-center gap-2"><Icon name="layout-template"/> Personalizar Impresión</h3>
                             <button onClick={onClose}><Icon name="x"/></button>
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-600 mb-1">TÍTULO DEL REPORTE</label>
                                <input type="text" value={conf.reportTitle} onChange={(e)=>setConf({...conf, reportTitle: e.target.value})} className="w-full border p-2 rounded text-sm font-bold" placeholder="Ej: ORDEN DE PRODUCCIÓN"/>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-600 mb-1">PIE DE PÁGINA</label>
                                <input type="text" value={conf.footerText} onChange={(e)=>setConf({...conf, footerText: e.target.value})} className="w-full border p-2 rounded text-sm" placeholder="Ej: TEXTIL CIRINEO S.A."/>
                            </div>
                            <div className="flex items-center gap-3 bg-slate-100 p-3 rounded">
                                <input type="checkbox" id="effCheck" checked={conf.showEfficiency !== false} onChange={(e)=>setConf({...conf, showEfficiency: e.target.checked})} className="w-5 h-5 accent-indigo-600"/>
                                <label htmlFor="effCheck" className="text-sm font-bold text-slate-700 cursor-pointer">Mostrar Cálculos de Eficiencia (Pzs/Hora)</label>
                            </div>
                        </div>

                        <button onClick={handleSave} className="w-full mt-6 bg-slate-900 text-white py-3 rounded font-bold hover:bg-slate-800 flex items-center justify-center gap-2">
                            <Icon name="save"/> GUARDAR CAMBIOS
                        </button>
                    </div>
                </div>
            );
        };

        const ImageGallery = ({ config, onClose, orders }) => {
            const [filter, setFilter] = useState('');
            const allCodes = useMemo(() => {
                const uniqueCodes = new Set(orders.map(o => o.codigo).filter(c => c));
                return Array.from(uniqueCodes).sort();
            }, [orders]);
            const filteredCodes = useMemo(() => {
                if (!filter) return allCodes;
                return allCodes.filter(c => c.toUpperCase().includes(filter.toUpperCase()));
            }, [allCodes, filter]);
            return (
                <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-6 rounded-lg shadow-2xl w-full max-w-4xl h-full flex flex-col">
                        <div className="flex justify-between items-center mb-4 border-b pb-2 shrink-0">
                            <h3 className="font-bold text-xl text-indigo-700 flex items-center gap-2"><Icon name="images"/> Galería de Modelos</h3>
                            <button onClick={onClose} className="bg-red-500 hover:bg-red-600 text-white rounded-md p-2 shadow-lg flex items-center gap-1 font-bold text-xs transition-transform hover:scale-105">
                                <Icon name="x" size={18}/> CERRAR
                            </button>
                        </div>
                        <input type="text" placeholder="Filtrar por código de modelo..." value={filter} onChange={(e) => setFilter(e.target.value)} className="w-full p-2 mb-4 border rounded shadow-sm" />
                        <div className="flex-grow overflow-y-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 p-2">
                            {config.repoUrls && config.repoUrls.map((repo, idx) => (
                                <div key={idx} className="col-span-full border-b pb-2 mb-2">
                                    <h4 className="font-bold text-sm text-slate-600 mb-2">Carpeta: <span className="font-mono text-xs">{repo}</span></h4>
                                    <div className="grid grid-cols-subgrid gap-4">
                                        {filteredCodes.map(codigo => (
                                            <div key={`${repo}-${codigo}`} className="aspect-square border rounded shadow overflow-hidden flex flex-col">
                                                <SmartImage repoUrls={[repo]} codigo={codigo} className="w-full h-2/3 object-contain bg-slate-100 p-1" />
                                                <div className="text-center text-xs font-bold p-1 bg-gray-100 h-1/3 flex items-center justify-center">{codigo}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            {!config.repoUrls && <div className="text-center text-slate-500 col-span-full">Configura las URLs de los repositorios en Ajustes.</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [orders, setOrders] = useState([]);
            const [config, setConfig] = useState({});
            const [printConfig, setPrintConfig] = useState({}); // Nuevo estado para config de impresión
            const [inventory, setInventory] = useState({});
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [formProps, setFormProps] = useState({ initialOrder: null, isEditing: false }); 
            const [showSettings, setShowSettings] = useState(false);
            const [showPrintConfig, setShowPrintConfig] = useState(false); // Modal de config impresión
            const [showImport, setShowImport] = useState(false); // Para importar excel (mantiene compatibilidad simple)
            const [showGallery, setShowGallery] = useState(false);
            const [viewMode, setViewMode] = useState('active'); 

            useEffect(() => {
                const u1 = db.collection('orders').onSnapshot(s => setOrders(s.docs.map(d=>d.data())));
                const u2 = db.collection('settings').doc('config').onSnapshot(d => setConfig(d.data() || {}));
                const u3 = db.collection('inventory').doc('main').onSnapshot(d => setInventory(d.data() || {}));
                const u4 = db.collection('settings').doc('print').onSnapshot(d => setPrintConfig(d.data() || {}));
                setTimeout(()=>lucide.createIcons(), 500);
                return () => { u1(); u2(); u3(); u4(); };
            }, []);
            useEffect(()=>lucide.createIcons(), [view, orders, viewMode]);

            const displayedOrders = useMemo(() => {
                if(viewMode === 'active') {
                    return orders.filter(o => o.status !== 'ARCHIVADO');
                } else {
                    return orders.filter(o => o.status === 'ARCHIVADO');
                }
            }, [orders, viewMode]);

            const allClients = [...new Set(orders.map(o => o.cliente))].sort();
            
            // Nota: Importación simple mantenida para compatibilidad, pero la creación manual es preferida ahora
            const handleImportData = (data) => {
                // Al importar, asignamos la fecha de hoy y consecutivo '00' por defecto para que el usuario edite
                setFormProps({ 
                    initialOrder: { ...data, deliveryDate: new Date().toISOString().split('T')[0], sequence: '00' }, 
                    isEditing: false 
                });
                setShowImport(false);
                setView('create');
            };

            const handleEditOrder = (order) => {
                setFormProps({ initialOrder: order, isEditing: true });
                setView('create');
                setSelectedOrder(null);
            };

            return (
                <div className="h-screen bg-slate-100 overflow-hidden">
                    {view === 'create' && <div className="absolute inset-0 z-50 bg-black/50 flex items-center justify-center"><MultiOrderForm config={config} onCancel={()=>setView('dashboard')} initialOrder={formProps.initialOrder} clientHistory={allClients} inventory={inventory} isEditing={formProps.isEditing}/></div>}
                    
                    {view === 'detail' && selectedOrder && <div className="absolute inset-0 z-40 bg-white overflow-y-auto print-visible-wrapper"><OrderView order={orders.find(o=>o.id===selectedOrder.id) || selectedOrder} config={config} printConfig={printConfig} onBack={()=>setView('dashboard')} onEdit={handleEditOrder}/></div>}
                    
                    {showSettings && <SettingsModal config={config} onClose={()=>setShowSettings(false)} onOpenPrintConfig={()=>{setShowSettings(false); setShowPrintConfig(true);}} />}
                    {showPrintConfig && <PrintConfigModal currentConfig={printConfig} onClose={()=>setShowPrintConfig(false)} />}
                    {/* Importar desactivado por ahora para enfocar en la nueva lógica manual, o puedes reactivarlo si lo ajustas */}
                    {/* {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={handleImportData} />} */}
                    {showGallery && <ImageGallery config={config} onClose={()=>setShowGallery(false)} orders={orders} />}

                    <div className="dashboard-grid">
                        <div className="top-pane bg-slate-100 p-4">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-black text-slate-800 flex gap-2 items-center">
                                    <Icon name="layout-dashboard"/> 
                                    <span>{viewMode === 'active' ? 'PLANTA' : 'HISTORIAL'}</span>
                                    <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded ml-2">v3.1 Export</span>
                                </h1>
                                <div className="flex gap-2 items-center">
                                    <InstallButton />
                                    
                                    <button onClick={()=>setViewMode(viewMode === 'active' ? 'history' : 'active')} className={`px-4 py-2 rounded font-bold shadow flex items-center gap-2 text-xs transition ${viewMode === 'active' ? 'bg-orange-500 hover:bg-orange-600 text-white' : 'bg-slate-700 text-white'}`}>
                                        <Icon name={viewMode === 'active' ? 'history' : 'activity'}/> 
                                        {viewMode === 'active' ? 'HISTORIAL' : 'VER PLANTA'}
                                    </button>

                                    <button onClick={()=>setShowGallery(true)} className="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-2 text-xs"><Icon name="image-search"/> GALERÍA</button>
                                    <button onClick={()=>setShowSettings(true)} className="bg-slate-300 hover:bg-slate-400 text-slate-800 p-2 rounded shadow"><Icon name="settings"/></button>
                                    
                                    {viewMode === 'active' && (
                                        <>
                                            <button onClick={()=>{setFormProps({initialOrder:null, isEditing: false}); setView('create')}} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-2"><Icon name="plus"/> NUEVA ORDEN</button>
                                            {/* Importar oculto para simplificar la transición a la nueva nomenclatura */}
                                        </>
                                    )}
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                {displayedOrders.sort((a,b)=>b.id-a.id).map(o => {
                                    const pct = Math.round((o.progreso.filter(p=>p.finished).length / o.progreso.length)*100);
                                    // Manejo de compatibilidad para órdenes viejas vs nuevas
                                    const pBase = o.partidaBase || o.partida;
                                    return (
                                        <div key={o.id} onClick={()=>{setSelectedOrder(o); setView('detail')}} className={`p-3 rounded shadow border-l-4 cursor-pointer hover:shadow-lg transition ${o.status === 'ARCHIVADO' ? 'bg-slate-200 border-slate-500 opacity-75' : 'bg-white border-indigo-500'}`}>
                                            <div className="flex justify-between items-start">
                                                <div className="font-bold text-lg">{o.codigo}</div>
                                                <div className="bg-slate-200 text-slate-700 text-xs px-2 py-1 rounded font-bold">MQ-{o.maquina}</div>
                                            </div>
                                            <div className="text-xs font-bold text-indigo-800 mt-1">PARTIDA: {pBase}</div>
                                            <div className="text-[10px] text-slate-400">Total: {o.totalPedido} pzs</div>
                                            <div className="mt-2 w-full bg-slate-100 h-2 rounded overflow-hidden">
                                                <div className={`${o.status === 'ARCHIVADO' ? 'bg-slate-500' : 'bg-green-500'} h-full`} style={{width:`${pct}%`}}></div>
                                            </div>
                                            {o.status === 'ARCHIVADO' && <div className="text-center text-[10px] font-bold text-slate-500 mt-1">ARCHIVADO</div>}
                                        </div>
                                    );
                                })}
                                {displayedOrders.length === 0 && <div className="col-span-4 text-center text-slate-400 py-10 font-bold">No hay órdenes en esta vista.</div>}
                            </div>
                        </div>
                        
                        {viewMode === 'active' && <DashboardBottom activeOrders={displayedOrders} />}
                        {viewMode === 'history' && <div className="bg-slate-800 text-white flex items-center justify-center p-10 font-bold text-xl opacity-50">MODO HISTORIAL - SOLO LECTURA</div>}
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
