<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MAES26 Control + Planeación</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .slot-input {
            background: transparent; border: none; outline: none; text-align: center; width: 100%;
            font-weight: bold; padding: 0; z-index: 1; position: relative;
        }
        .slot-input:focus { background: #1e293b; color: #60a5fa; }
        .slot-input::placeholder { color: #475569; font-weight: normal; font-size: 8px; }
        .password-mask { -webkit-text-security: disc; text-security: disc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom-in { animation: zoomIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .machine-circle { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .machine-circle.selected { transform: scale(1.1); box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans fixed inset-0 overflow-hidden">

    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBqHgV4vDat1-VmZfKbiPg7nuiX-ROcexw",
            authDomain: "cirineo-cec21.firebaseapp.com",
            projectId: "cirineo-cec21",
            storageBucket: "cirineo-cec21.firebasestorage.app",
            messagingSenderId: "620210618284",
            appId: "1:620210618284:web:482bab9bf74650fff18409",
            measurementId: "G-B7YLM78RVW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ROLES = { 
            ADMIN: 'admin', 
            COMMENTATOR: 'commentator', 
            OBSERVER: 'observer', 
            DEVELOPMENT: 'development',
            OPERATOR: 'operator'
        };

        const USERS = {
            '1111': { name: 'Marco Espinoza', role: ROLES.ADMIN, area: 'Administración', canManageOrders: true },
            '0000': { name: 'Prisciliano Espinoza', role: ROLES.COMMENTATOR, area: 'Comentarios' },
            '2222': { name: 'Susana', role: ROLES.OBSERVER, area: 'Observación', canManageOrders: true }, 
            '1352': { name: 'Vallejo', role: ROLES.DEVELOPMENT, area: 'Desarrollo', canManageOrders: true }, 
            '3333': { name: 'Tejido', role: ROLES.OPERATOR, area: 'Operadores Gral' },
            '1392': { name: 'Andrés', role: ROLES.OPERATOR, area: 'Tejido (A)', allowedSlots: [0] },
            '7914': { name: 'Balta', role: ROLES.OPERATOR, area: 'Tejido (B)', allowedSlots: [1] }
        };
        
        const MACHINES = [
            { id: 'm35', name: 'MAQ 35', type: 'SANTONI SM8' }, { id: 'm39', name: 'MAQ 39', type: 'SANTONI SM8' },
            { id: 'm40', name: 'MAQ 40', type: 'SANTONI SM8' }, { id: 'm36', name: 'MAQ 36', type: 'CIXING GE82' },
            { id: 'm38', name: 'MAQ 38', type: 'SANTONI SM8' }, { id: 'm37', name: 'MAQ 37', type: 'SANTONI SM8' },
            { id: 'm29', name: 'MAQ 29', type: 'SANTONI EVO4' }, { id: 'm28', name: 'MAQ 28', type: 'SANTONI EVO4' },
            { id: 'm27', name: 'MAQ 27', type: 'SANTONI EVO4' }, { id: 'm33', name: 'MAQ 33', type: 'SANTONI EVO4' },
            { id: 'm1',  name: 'MAQ 1',  type: 'CIXING' }, { id: 'm30', name: 'MAQ 30', type: 'CIXING GE82' },
            { id: 'm31', name: 'MAQ 31', type: 'CIXING GE82' }, { id: 'm6',  name: 'MAQ 6',  type: 'CIXING GE82' },
            { id: 'm32', name: 'MAQ 32', type: 'CIXING GE82' }, { id: 'm13', name: 'MAQ 13', type: 'SANTONI EVO4' },
            { id: 'm12', name: 'MAQ 12', type: 'SANTONI EVO4' }, { id: 'm24', name: 'MAQ 24', type: 'SANTONI EVO4' },
            { id: 'm8',  name: 'MAQ 8',  type: 'SANTONI TOP2' },
        ];

        const generateCalendar = () => {
            const dates = [];
            const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
            const start = new Date(2025, 8, 29); const end = new Date(2026, 11, 31);
            let idx = 0;
            for (let d = start; d <= end; d.setDate(d.getDate() + 1)) {
                dates.push({
                    index: idx++,
                    id: `${['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`,
                    shortDay: ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'][d.getDay()],
                    dateNum: d.getDate(),
                    month: months[d.getMonth()],
                    monthIndex: d.getMonth(),
                    year: d.getFullYear(), 
                    isoDate: d.toISOString().split('T')[0] 
                });
            }
            return dates;
        };

        const ALL_ROWS = generateCalendar();
        const INITIAL_STATE = (() => {
            const todayISO = new Date().toISOString().split('T')[0];
            const foundIndex = ALL_ROWS.findIndex(r => r.isoDate === todayISO);
            return foundIndex !== -1 ? { weekOffset: Math.floor(foundIndex / 7), selectedDayIndex: foundIndex % 7 } : { weekOffset: 0, selectedDayIndex: 0 };
        })();

        const getWeekLabel = (weekRows) => {
            if (!weekRows || weekRows.length === 0) return '';
            const f = weekRows[0], l = weekRows[weekRows.length - 1];
            return f.month === l.month ? `${f.month} ${f.year}` : `${f.month} - ${l.month} ${l.year}`;
        };

        // --- CÁLCULO PROYECCIÓN ---
        const calculateOrderMetrics = (machineId, order, allProductionData, allRows, globalHiddenDays) => {
            if (!order || !order.totalQty || !order.timePerPieceMin || !order.startDate) {
                return { isPlanned: false, finishDate: null, totalNeeded: 0, progress: 0, produced: 0 };
            }
            
            const totalQty = Number(order.totalQty);
            let dailyHours = 0;
            if (order.operators && Array.isArray(order.operators)) {
                dailyHours = order.operators.length * 12; 
            } else {
                dailyHours = Number(order.dailyHours || 12);
            }
            
            const timePerPieceMin = Number(order.timePerPieceMin);
            const disabledDates = order.disabledDates || []; 

            // 1. Producción Real
            let produced = 0;
            const startIndex = allRows.findIndex(r => r.isoDate === order.startDate);
            
            if (startIndex !== -1) {
                for (let i = startIndex; i < allRows.length; i++) {
                    const row = allRows[i];
                    produced += Number(allProductionData[row.id]?.[machineId]?.actual || 0);
                    if (new Date(row.isoDate) > new Date()) break; 
                }
            }

            const progress = totalQty > 0 ? Math.min(100, (produced / totalQty) * 100) : 0;
            const remainingQty = Math.max(0, totalQty - produced);
            
            if (remainingQty <= 0) {
                return { isPlanned: true, finishDate: 'COMPLETADO', totalNeeded: 0, progress: 100, produced };
            }
            
            const dailyCapacity = Math.floor((dailyHours * 60) / timePerPieceMin);
            
            // 2. Proyección Futura
            let projRemaining = remainingQty;
            let currentIdx = startIndex !== -1 ? startIndex : 0;
            const todayIdx = allRows.findIndex(r => r.isoDate >= new Date().toISOString().split('T')[0]);
            if (todayIdx > currentIdx) currentIdx = todayIdx;

            if (currentIdx === -1) return { isPlanned: true, finishDate: 'PENDIENTE', totalNeeded: remainingQty, progress, produced };

            for (let i = currentIdx; i < allRows.length; i++) {
                const row = allRows[i];
                if (globalHiddenDays.includes(row.id) || disabledDates.includes(row.isoDate)) continue;
                
                projRemaining -= dailyCapacity; 
                if (projRemaining <= 0) return { isPlanned: true, finishDate: row.isoDate, totalNeeded: remainingQty, progress, produced };
            }

            return { isPlanned: true, finishDate: 'PENDIENTE', totalNeeded: remainingQty, progress, produced };
        };

        const ProductionSlot = ({ slotData, index, disabled, onUpdate }) => {
            const [localModel, setLocalModel] = useState(slotData?.model || '');
            const [localQty, setLocalQty] = useState('');
            const [isDirty, setIsDirty] = useState(false);

            useEffect(() => {
                if (!isDirty) { 
                    setLocalModel(slotData?.model || ''); 
                    setLocalQty(slotData?.qty ?? ''); 
                }
            }, [slotData, isDirty]);

            const handleSave = (e) => {
                e?.preventDefault();
                if (localModel !== (slotData?.model || '')) onUpdate(index, 'model', localModel);
                if (String(localQty) !== String(slotData?.qty ?? '')) onUpdate(index, 'qty', localQty);
                setIsDirty(false);
            };

            const handleChange = (f, v) => { if (f==='model') setLocalModel(v); else setLocalQty(v); setIsDirty(true); };
            const handleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleSave(); e.target.blur(); } };

            return (
                <div className={`flex flex-col border border-slate-700/50 rounded overflow-hidden h-full relative ${disabled ? 'bg-slate-900/20 opacity-40' : 'bg-slate-800'} ${isDirty ? 'border-yellow-500/50' : ''}`}>
                    <input type="text" placeholder="MOD" value={localModel} onChange={(e) => handleChange('model', e.target.value)} onKeyDown={handleKeyDown} disabled={disabled} className="slot-input text-[8px] text-yellow-500 uppercase border-b border-slate-700/50 h-1/2" />
                    <input type="number" placeholder="CANT" value={localQty} onChange={(e) => handleChange('qty', e.target.value)} onKeyDown={handleKeyDown} disabled={disabled} className="slot-input text-[10px] text-white h-1/2" />
                    {isDirty && !disabled && (<div className="absolute inset-y-0 right-0 w-8 flex items-center justify-center bg-gradient-to-l from-slate-900 via-slate-900/80 to-transparent z-10 animate-zoom-in"><button onClick={handleSave} className="bg-green-600 text-white rounded-full p-1 shadow-lg hover:scale-110"><i data-lucide="check" className="w-3 h-3"></i></button></div>)}
                </div>
            );
        };

        // --- GESTOR DE PEDIDOS ---
        const OrderManager = ({ onClose, onSaveOrders, onDeleteOrder, ordersData, allProductionData, allRows, hiddenDays }) => {
            const [step, setStep] = useState(1);
            const [viewMode, setViewMode] = useState('list'); 
            
            const [modelName, setModelName] = useState('');
            const [selectedMachines, setSelectedMachines] = useState([]);
            const [config, setConfig] = useState({ 
                totalQty: '', 
                timePerPiece: '', 
                startDate: new Date().toISOString().split('T')[0],
                operators: ['Andrés', 'Balta'], 
                disabledDates: []
            });
            const [isEditing, setIsEditing] = useState(false);

            const toggleMachine = (id) => {
                setSelectedMachines(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
            };

            const toggleOperator = (op) => {
                setConfig(prev => {
                    const current = prev.operators;
                    if (current.includes(op)) {
                        if (current.length === 1) return prev; 
                        return { ...prev, operators: current.filter(o => o !== op) };
                    }
                    return { ...prev, operators: [...current, op] };
                });
            };

            const toggleDateDisabled = (isoDate) => {
                setConfig(prev => {
                    const current = prev.disabledDates;
                    if (current.includes(isoDate)) return { ...prev, disabledDates: current.filter(d => d !== isoDate) };
                    return { ...prev, disabledDates: [...current, isoDate] };
                });
            };

            const calculatePreview = () => {
                if (!config.totalQty || !config.timePerPiece) return null;
                const dummyOrder = { 
                    totalQty: config.totalQty, 
                    timePerPieceMin: config.timePerPiece, 
                    startDate: config.startDate, 
                    operators: config.operators,
                    disabledDates: config.disabledDates
                };
                const calc = calculateOrderMetrics('dummy', dummyOrder, {}, allRows, hiddenDays); 
                return calc.finishDate;
            };

            const handleStartCreate = () => {
                setIsEditing(false);
                setModelName('');
                setSelectedMachines([]);
                setConfig({ totalQty: '', timePerPiece: '', startDate: new Date().toISOString().split('T')[0], operators: ['Andrés', 'Balta'], disabledDates: [] });
                setStep(1);
                setViewMode('create');
            };

            const handleStartEdit = (machineId, orderData) => {
                setIsEditing(true);
                setModelName(orderData.model);
                setSelectedMachines([machineId]); 
                setConfig({
                    totalQty: orderData.totalQty,
                    timePerPiece: orderData.timePerPieceMin,
                    startDate: orderData.startDate,
                    operators: orderData.operators || (orderData.dailyHours == 24 ? ['Andrés', 'Balta'] : ['Andrés']),
                    disabledDates: orderData.disabledDates || []
                });
                setStep(1);
                setViewMode('create');
            };

            const handleDelete = (machineId) => {
                if(confirm('¿Seguro que quieres eliminar este pedido? Se perderá el seguimiento.')) {
                    onDeleteOrder(machineId);
                }
            };

            const handleFinalSave = () => {
                selectedMachines.forEach(mid => {
                    const orderPayload = {
                        model: modelName,
                        totalQty: Number(config.totalQty),
                        timePerPieceMin: Number(config.timePerPiece),
                        startDate: config.startDate,
                        operators: config.operators, 
                        dailyHours: config.operators.length * 12, 
                        disabledDates: config.disabledDates
                    };
                    onSaveOrders(mid, orderPayload);
                });
                setViewMode('list');
            };

            const renderCalendarPicker = () => {
                const finishDate = calculatePreview();
                if (!finishDate) return <div className="text-center text-red-400">Datos insuficientes para calcular</div>;
                
                const startIdx = allRows.findIndex(r => r.isoDate === config.startDate);
                if (startIdx === -1) return null;

                let endIdx = allRows.findIndex(r => r.isoDate === finishDate);
                if (finishDate === 'COMPLETADO') endIdx = startIdx + 1; 
                if (endIdx === -1) endIdx = startIdx + 60; 
                else endIdx += 7; 

                const daysToShow = allRows.slice(startIdx, Math.min(allRows.length, endIdx + 15));

                return (
                    <div className="grid grid-cols-7 gap-1">
                        {['D','L','M','M','J','V','S'].map(d => <div key={d} className="text-center text-[10px] text-slate-500 font-bold">{d}</div>)}
                        {daysToShow.map(row => {
                            const isDisabled = config.disabledDates.includes(row.isoDate);
                            const isGlobalHidden = hiddenDays.includes(row.id);
                            const isWithinRange = !isDisabled && !isGlobalHidden && (finishDate !== 'COMPLETADO' && row.isoDate <= finishDate);

                            let bgClass = 'bg-slate-800 text-slate-500'; 
                            if (isGlobalHidden) bgClass = 'bg-slate-900 opacity-30 cursor-not-allowed';
                            else if (isDisabled) bgClass = 'bg-red-900/40 text-red-500 border border-red-900'; 
                            else if (isWithinRange) bgClass = 'bg-green-600 text-white shadow shadow-green-900'; 

                            return (
                                <button key={row.id} 
                                    onClick={() => !isGlobalHidden && toggleDateDisabled(row.isoDate)}
                                    className={`p-1 rounded text-[10px] font-bold h-10 flex flex-col items-center justify-center transition-all ${bgClass}`}>
                                    <span>{row.dateNum}</span>
                                    <span className="text-[6px] uppercase">{row.month}</span>
                                </button>
                            );
                        })}
                    </div>
                );
            };

            const renderCreateFlow = () => (
                <div className="flex flex-col h-full">
                    <div className="flex justify-between mb-6 px-2">
                        {[1,2,3,4,5].map(s => (
                            <div key={s} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${step >= s ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-500'}`}>{s}</div>
                        ))}
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar px-2">
                        {step === 1 && (
                            <div className="space-y-4 fade-in">
                                <h3 className="text-xl font-bold text-white text-center mb-6">{isEditing ? 'Editar Pedido' : 'Nuevo Pedido'}</h3>
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <label className="block text-blue-400 font-bold uppercase text-xs mb-2">Ingresa el Modelo</label>
                                    <input type="text" value={modelName} onChange={e => setModelName(e.target.value.toUpperCase())} placeholder="EJ: B001-EG" className="w-full bg-slate-900 text-2xl font-black text-white p-4 rounded-lg border border-slate-600 focus:border-blue-500 outline-none text-center uppercase" autoFocus />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="fade-in">
                                <h3 className="text-lg font-bold text-white text-center mb-4">Selecciona Máquinas</h3>
                                <div className="grid grid-cols-4 gap-4 justify-items-center">
                                    {MACHINES.map(m => {
                                        const isSelected = selectedMachines.includes(m.id);
                                        const hasActiveOrder = !isEditing && ordersData[m.id] && ordersData[m.id].totalQty > 0;
                                        return (
                                            <button key={m.id} disabled={hasActiveOrder} onClick={() => toggleMachine(m.id)} className={`machine-circle w-14 h-14 rounded-full flex flex-col items-center justify-center border-2 shadow-lg relative ${isSelected ? 'bg-green-600 border-green-400 selected' : hasActiveOrder ? 'bg-slate-800 border-slate-600 opacity-30 grayscale' : 'bg-red-600 border-red-400'}`}>
                                                <span className="text-[10px] font-black text-white">{m.name.replace('MAQ ','')}</span>
                                                {isSelected && <div className="absolute -top-1 -right-1 bg-white text-green-600 rounded-full p-0.5"><i data-lucide="check" className="w-3 h-3"></i></div>}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-4 fade-in">
                                <h3 className="text-lg font-bold text-white text-center mb-4">Configuración</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2">
                                        <label className="text-xs text-slate-400 uppercase mb-2 block">Operadores (Turno)</label>
                                        <div className="flex gap-2">
                                            {['Andrés', 'Balta'].map(op => {
                                                const active = config.operators.includes(op);
                                                return (
                                                    <button key={op} onClick={() => toggleOperator(op)} className={`flex-1 py-3 rounded-lg border font-bold text-sm flex items-center justify-center gap-2 ${active ? 'bg-blue-600 border-blue-400 text-white' : 'bg-slate-800 border-slate-600 text-slate-500'}`}>
                                                        {active ? <i data-lucide="check-circle" className="w-4 h-4"/> : <i data-lucide="circle" className="w-4 h-4"/>}
                                                        {op}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    <div><label className="text-xs text-slate-400 uppercase">Cantidad Total</label><input type="number" value={config.totalQty} onChange={e => setConfig({...config, totalQty: e.target.value})} className="w-full bg-slate-900 border border-slate-600 p-3 rounded text-white" placeholder="1000" /></div>
                                    <div><label className="text-xs text-slate-400 uppercase">Minutos/Pieza</label><input type="number" value={config.timePerPiece} onChange={e => setConfig({...config, timePerPiece: e.target.value})} className="w-full bg-slate-900 border border-slate-600 p-3 rounded text-white" placeholder="1.5" /></div>
                                    <div className="col-span-2"><label className="text-xs text-slate-400 uppercase">Fecha Inicio</label><input type="date" value={config.startDate} onChange={e => setConfig({...config, startDate: e.target.value})} className="w-full bg-slate-900 border border-slate-600 p-3 rounded text-white" /></div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="space-y-4 fade-in">
                                <h3 className="text-lg font-bold text-white text-center mb-1">Planeación Automática</h3>
                                <p className="text-xs text-slate-400 text-center mb-4">Toca un día verde para desactivarlo (descanso/paro)</p>
                                
                                <div className="bg-slate-900 p-2 rounded-lg border border-slate-700 mb-4">
                                    <div className="flex justify-between items-center text-sm">
                                        <span className="text-slate-400">Fin Estimado:</span>
                                        <span className="font-bold text-green-400 text-lg">{calculatePreview() ? new Date(calculatePreview()).toLocaleDateString() : '...'}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 rounded-lg p-2 border border-slate-700/50 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    {renderCalendarPicker()}
                                </div>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="space-y-6 fade-in text-center">
                                <h3 className="text-xl font-bold text-white">Confirmación</h3>
                                <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 inline-block text-left w-full">
                                    <div className="flex justify-between border-b border-slate-700 pb-2 mb-2">
                                        <span className="text-slate-400">Modelo:</span>
                                        <span className="font-bold text-yellow-400 text-lg">{modelName}</span>
                                    </div>
                                    <div className="flex justify-between mb-1"><span className="text-slate-400">Máquinas:</span><span className="text-white">{selectedMachines.length}</span></div>
                                    <div className="flex justify-between mb-1"><span className="text-slate-400">Total/Máq:</span><span className="text-white">{Number(config.totalQty).toLocaleString()} pzas</span></div>
                                    <div className="flex justify-between mb-1"><span className="text-slate-400">Operadores:</span><span className="text-white text-xs">{config.operators.join(' & ')}</span></div>
                                    <div className="flex justify-between border-t border-slate-700 pt-2 mt-2">
                                        <span className="text-blue-400 font-bold">Fin Estimado:</span>
                                        <span className="text-green-400 font-bold text-lg">{calculatePreview() ? new Date(calculatePreview()).toLocaleDateString() : 'Error'}</span>
                                    </div>
                                </div>
                                <p className="text-sm text-slate-400">¿Deseas guardar esta planeación?</p>
                            </div>
                        )}
                    </div>

                    <div className="mt-4 pt-4 border-t border-slate-700 flex justify-between">
                        {step > 1 ? <button onClick={() => setStep(s => s - 1)} className="px-4 py-2 rounded bg-slate-700 text-white">Atrás</button> : <button onClick={() => setViewMode('list')} className="px-4 py-2 rounded bg-slate-800 text-slate-400">Cancelar</button>}
                        {step < 5 ? (
                            <button onClick={() => {
                                if (step===1 && !modelName) return;
                                if (step===2 && selectedMachines.length===0) return;
                                if (step===3 && (!config.totalQty || !config.timePerPiece)) return;
                                setStep(s => s + 1);
                            }} className="px-6 py-2 rounded bg-blue-600 text-white font-bold hover:bg-blue-500">Siguiente</button>
                        ) : (
                            <button onClick={handleFinalSave} className="px-6 py-2 rounded bg-green-600 text-white font-bold shadow-lg hover:bg-green-500 animate-pulse">CONFIRMAR</button>
                        )}
                    </div>
                </div>
            );

            const renderListView = () => {
                const activeMachines = MACHINES.filter(m => ordersData[m.id] && ordersData[m.id].totalQty > 0);
                return (
                    <div className="flex flex-col h-full">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black text-white flex items-center gap-2"><i data-lucide="clipboard-list" className="text-yellow-400"></i> Pedidos Activos</h2>
                            <button onClick={handleStartCreate} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105"><i data-lucide="plus-circle" className="w-5 h-5"></i> Nuevo</button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3">
                            {activeMachines.length === 0 && <div className="text-center text-slate-500 py-10">No hay pedidos activos.</div>}
                            {activeMachines.map(m => {
                                const order = ordersData[m.id];
                                const metrics = calculateOrderMetrics(m.id, order, allProductionData, allRows, hiddenDays);
                                
                                return (
                                    <div key={m.id} className="bg-slate-900 border border-slate-700 p-4 rounded-xl shadow-md relative overflow-hidden group">
                                        <div className="flex justify-between items-start mb-2 relative z-10">
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <span className="font-bold text-blue-400 text-sm">{m.name}</span>
                                                    <span className="text-[10px] bg-slate-800 px-2 rounded text-slate-400">{m.type.split(' ')[0]}</span>
                                                </div>
                                                <h4 className="text-xl font-black text-yellow-400 uppercase mt-1">{order.model}</h4>
                                            </div>
                                            <div className="flex flex-col items-end gap-2">
                                                <div className="flex gap-1">
                                                     <button onClick={() => handleStartEdit(m.id, order)} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded text-blue-400"><i data-lucide="pencil" className="w-4 h-4"></i></button>
                                                     <button onClick={() => handleDelete(m.id)} className="p-1.5 bg-slate-800 hover:bg-red-900/50 rounded text-red-400"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                                <div className="text-right">
                                                    <span className={`block text-xs font-bold ${metrics.finishDate === 'COMPLETADO' ? 'text-green-500' : 'text-slate-400'}`}>{metrics.finishDate === 'COMPLETADO' ? '¡LISTO!' : 'Fin Estimado'}</span>
                                                    <span className="text-lg font-bold text-white">{metrics.finishDate === 'COMPLETADO' ? <i data-lucide="check-circle" className="w-5 h-5 inline"/> : (metrics.finishDate ? new Date(metrics.finishDate).toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) : '-')}</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="relative z-10">
                                            <div className="flex justify-between text-xs text-slate-400 mb-1">
                                                <span>Progreso: {metrics.progress.toFixed(1)}%</span>
                                                <span>{metrics.produced.toLocaleString()} / {Number(order.totalQty).toLocaleString()}</span>
                                            </div>
                                            <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                                                <div className="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-1000" style={{ width: `${metrics.progress}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-2xl h-[90vh] flex flex-col border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900">
                            <span className="font-bold text-white uppercase tracking-wider text-sm">Gestión de Producción</span>
                            <button onClick={onClose}><i data-lucide="x" className="text-slate-400 w-6 h-6 hover:text-white"></i></button>
                        </div>
                        <div className="flex-1 p-6 overflow-hidden">
                            {viewMode === 'list' ? renderListView() : renderCreateFlow()}
                        </div>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ setAuthenticatedUser, installPrompt, onInstall }) => {
            const [pin, setPin] = useState('');
            const handleLogin = (e) => {
                e.preventDefault();
                const user = USERS[pin]; 
                if (user) setAuthenticatedUser({ ...user, id: pin }); 
                else alert('PIN incorrecto');
            };
            return (
                <div className="flex items-center justify-center h-full bg-slate-900 p-4">
                    <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-slate-700 relative">
                        <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg"><i data-lucide="grid" className="w-8 h-8"></i></div>
                        <h2 className="text-2xl font-black text-white mb-2">MAES - TEJIDO</h2>
                        <p className="text-slate-400 mb-8">Control & Planeación</p>
                        <form onSubmit={handleLogin} className="space-y-4" autoComplete="off">
                            <input type="tel" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="• • • •" className="w-full text-center text-4xl p-4 bg-slate-900 border-2 border-slate-700 rounded-xl tracking-[0.2em] focus:border-blue-500 outline-none font-bold text-white password-mask" autoFocus />
                            <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-500 shadow-lg">INGRESAR</button>
                        </form>
                        {installPrompt && (<div className="mt-8 pt-6 border-t border-slate-700"><button onClick={onInstall} className="flex items-center justify-center gap-2 w-full bg-slate-700 text-slate-200 py-3 rounded-lg font-bold text-sm border border-slate-600"><i data-lucide="download" className="w-4 h-4"></i>Instalar App</button></div>)}
                    </div>
                </div>
            );
        };

        const VisibilityModal = ({ onClose, currentHiddenMachines, currentHiddenDays, onSaveVisibility, allRows }) => {
            const [hiddenM, setHiddenM] = useState([...currentHiddenMachines]);
            const [hiddenD, setHiddenD] = useState([...currentHiddenDays]);
            const [dateToHide, setDateToHide] = useState('');
            const toggleMachine = (mid) => { if (hiddenM.includes(mid)) setHiddenM(prev => prev.filter(id => id !== mid)); else setHiddenM(prev => [...prev, mid]); };
            const hideDate = () => { if (!dateToHide) return; const row = allRows.find(r => r.isoDate === dateToHide); if (row && !hiddenD.includes(row.id)) setHiddenD(prev => [...prev, row.id]); setDateToHide(''); };
            const unhideDate = (rowId) => { setHiddenD(prev => prev.filter(id => id !== rowId)) };
            const handleSave = () => { onSaveVisibility(hiddenM, hiddenD); onClose(); };

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg h-[85vh] flex flex-col border border-slate-700" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900 rounded-t-2xl"><h3 className="font-bold text-lg text-white">Configuración Global</h3><button onClick={onClose}><i data-lucide="x" className="text-slate-400 w-6 h-6"></i></button></div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6">
                            <div><h4 className="text-xs font-bold text-blue-400 uppercase mb-2">Visibilidad Máquinas</h4><div className="grid grid-cols-2 gap-2">{MACHINES.map(m => { const isHidden = hiddenM.includes(m.id); return (<button key={m.id} onClick={() => toggleMachine(m.id)} className={`flex items-center justify-between p-2 rounded border text-sm ${isHidden ? 'bg-red-900/30 border-red-500/50 text-red-300' : 'bg-slate-900 border-slate-700 text-slate-300'}`}><span>{m.name}</span>{isHidden ? <i data-lucide="eye-off" className="w-4 h-4"></i> : <i data-lucide="eye" className="w-4 h-4 text-green-500/50"></i>}</button>) })}</div></div>
                            <div><h4 className="text-xs font-bold text-blue-400 uppercase mb-2">Ocultar Días (Feriados Globales)</h4><div className="flex gap-2 mb-3"><input type="date" value={dateToHide} onChange={e => setDateToHide(e.target.value)} className="bg-slate-900 text-white border border-slate-600 rounded p-2 flex-1 text-sm" /><button onClick={hideDate} className="bg-slate-700 px-3 rounded text-white text-sm">Ocultar</button></div>{hiddenD.map(rid => (<div key={rid} className="flex justify-between items-center text-sm p-2 bg-slate-800 rounded mb-1"><span className="text-slate-300">{rid}</span><button onClick={() => unhideDate(rid)} className="text-red-400 text-xs font-bold">Mostrar</button></div>))}</div>
                        </div>
                        <div className="p-4 border-t border-slate-700 bg-slate-900 rounded-b-2xl"><button onClick={handleSave} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Guardar</button></div>
                    </div>
                </div>
            )
        };

        const CalendarModal = ({ onClose, onSelectDate, allRows }) => {
            const [viewDate, setViewDate] = useState(new Date(2025, 9, 1)); 
            const handleMonthChange = (delta) => { const d = new Date(viewDate); d.setMonth(d.getMonth() + delta); setViewDate(d); };
            const monthRows = allRows.filter(r => r.monthIndex === viewDate.getMonth() && r.year === viewDate.getFullYear());
            const startDayOffset = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'].indexOf(monthRows[0]?.shortDay) || 0;
            const blanks = Array(startDayOffset).fill(null);

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700 p-4" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4"><button onClick={() => handleMonthChange(-1)} className="p-2 hover:bg-slate-700 rounded"><i data-lucide="chevron-left" className="text-white w-5 h-5"></i></button><span className="font-bold text-white uppercase">{viewDate.toLocaleString('es-MX', { month: 'long', year: 'numeric' })}</span><button onClick={() => handleMonthChange(1)} className="p-2 hover:bg-slate-700 rounded"><i data-lucide="chevron-right" className="text-white w-5 h-5"></i></button></div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">{['D','L','M','M','J','V','S'].map((d,i) => <div key={i} className="text-xs text-slate-500 font-bold">{d}</div>)}</div>
                        <div className="grid grid-cols-7 gap-1">{blanks.map((_, i) => <div key={`b-${i}`}></div>)}{monthRows.map(row => (<button key={row.id} onClick={() => onSelectDate(row)} className="aspect-square flex items-center justify-center rounded-lg hover:bg-blue-600 bg-slate-900 text-slate-200 text-sm font-bold border border-slate-700">{row.dateNum}</button>))}</div>
                        <button onClick={onClose} className="w-full mt-4 bg-slate-700 py-2 rounded-lg text-white font-bold text-sm">Cerrar</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [data, setData] = useState({});
            const [ordersData, setOrdersData] = useState({});
            const [visibilityConfig, setVisibilityConfig] = useState({ machines: [], days: [] });
            const [loading, setLoading] = useState(true);
            const [weekOffset, setWeekOffset] = useState(INITIAL_STATE.weekOffset);
            const [selectedDayIndex, setSelectedDayIndex] = useState(INITIAL_STATE.selectedDayIndex); 
            
            // Modales
            const [showOrderManager, setShowOrderManager] = useState(false);
            const [showVisibilityModal, setShowVisibilityModal] = useState(false);
            const [showCalendar, setShowCalendar] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            useEffect(() => { const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); }; window.addEventListener('beforeinstallprompt', handler); return () => window.removeEventListener('beforeinstallprompt', handler); }, []);
            
            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        const unsubDb = onSnapshot(collection(db, 'produccion_2026'), (snap) => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setData(d); setLoading(false); });
                        const unsubSettings = onSnapshot(doc(db, 'settings', 'visibility'), (docSnap) => { if (docSnap.exists()) setVisibilityConfig(docSnap.data()); });
                        const unsubOrders = onSnapshot(doc(db, 'settings', 'orders'), (docSnap) => { if (docSnap.exists()) setOrdersData(docSnap.data()); });
                        return () => { unsubDb(); unsubSettings(); unsubOrders(); };
                    } else signInAnonymously(auth);
                });
                return () => unsubAuth();
            }, []);

            const handleUpdateSlot = async (rowId, machineId, slotIndex, field, value) => {
                const currentMachineData = data[rowId]?.[machineId] || {};
                const currentSlots = currentMachineData.slots || [{}, {}, {}, {}];
                const updatedSlots = [...currentSlots];
                if (!updatedSlots[slotIndex]) updatedSlots[slotIndex] = {};
                if (field === 'qty') updatedSlots[slotIndex].qty = value === '' ? '' : Number(value);
                else updatedSlots[slotIndex].model = value;
                const newTotalActual = updatedSlots.reduce((acc, s) => acc + (Number(s?.qty) || 0), 0);
                const updatedMachine = { ...currentMachineData, slots: updatedSlots, actual: newTotalActual };
                await setDoc(doc(db, 'produccion_2026', rowId), { [machineId]: updatedMachine }, { merge: true });
            };

            const handleSaveOrder = async (machineId, orderData) => {
                await setDoc(doc(db, 'settings', 'orders'), { [machineId]: { ...orderData, lastUpdated: serverTimestamp(), updatedBy: user.name } }, { merge: true });
            };

            const handleDeleteOrder = async (machineId) => {
                await setDoc(doc(db, 'settings', 'orders'), { [machineId]: { totalQty: 0, lastUpdated: serverTimestamp() } }, { merge: true });
            };

            const handleSaveVisibility = async (hiddenMachines, hiddenDays) => { await setDoc(doc(db, 'settings', 'visibility'), { machines: hiddenMachines, days: hiddenDays }, { merge: true }); };

            const handleDateSelect = (row) => { setWeekOffset(Math.floor(row.index / 7)); setShowCalendar(false); };

            const visibleMachines = useMemo(() => MACHINES.filter(m => !visibilityConfig.machines?.includes(m.id)), [visibilityConfig.machines]);
            const currentWeekRows = useMemo(() => { const start = weekOffset * 7; return ALL_ROWS.slice(start, start + 7).filter(r => !visibilityConfig.days?.includes(r.id)); }, [weekOffset, visibilityConfig.days]);
            const weekLabel = useMemo(() => getWeekLabel(currentWeekRows), [currentWeekRows]);
            
            const canManageOrders = user && (user.canManageOrders || user.role === ROLES.DEVELOPMENT); 
            const canConfig = user && (user.role === ROLES.DEVELOPMENT); 
            const canEditSlot = (machineId, slotIndex) => {
                if (!user) return false;
                if (user.role === ROLES.ADMIN || user.role === ROLES.DEVELOPMENT) return true;
                if (user.allowedSlots) return user.allowedSlots.includes(slotIndex);
                return false; 
            };

            if (!user) return <LoginScreen setAuthenticatedUser={setUser} installPrompt={deferredPrompt} onInstall={() => deferredPrompt?.prompt()} />;
            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900"><i data-lucide="loader-2" className="animate-spin w-12 h-12 text-blue-500"></i></div>;

            const MobileView = () => {
                const safeIndex = selectedDayIndex >= currentWeekRows.length ? 0 : selectedDayIndex;
                const selectedDay = currentWeekRows[safeIndex];
                if (!selectedDay) return <div className="p-10 text-center text-slate-500">Semana sin días visibles</div>;
                const rowId = selectedDay.id;
                const dayData = data[rowId] || {};
                return (
                    <div className="flex flex-col h-full bg-slate-900">
                        <div className="bg-slate-800 shadow-sm z-20 shrink-0 border-b border-slate-700">
                             <div className="p-3 flex justify-between items-center bg-slate-900/50"> 
                                <div className="flex items-center gap-2"><i data-lucide="user-check" className="w-5 h-5 text-blue-400"></i><div><p className="text-sm font-bold text-slate-100">{user.name.split(' ')[0]}</p><p className="text-[10px] text-slate-500 uppercase font-medium">{user.area}</p></div></div>
                                <div className="flex gap-2">
                                    {canManageOrders && <button onClick={() => setShowOrderManager(true)} className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg animate-pulse"><i data-lucide="clipboard-list" className="w-4 h-4"></i></button>}
                                    {canConfig && <button onClick={() => setShowVisibilityModal(true)} className="w-8 h-8 bg-slate-700 rounded-lg flex items-center justify-center text-slate-300"><i data-lucide="settings" className="w-4 h-4"></i></button>}
                                </div>
                            </div>
                            <div className="flex overflow-x-auto custom-scrollbar pb-1 px-1 gap-1 bg-slate-900/50">{currentWeekRows.map((day, idx) => (<button key={day.id} onClick={() => setSelectedDayIndex(idx)} className={`flex-shrink-0 flex flex-col items-center justify-center p-2 min-w-[60px] rounded-lg my-2 transition-all ${idx === safeIndex ? 'bg-slate-700 shadow border-b-4 border-blue-500 scale-105' : 'text-slate-500 hover:bg-slate-800'}`}><span className="text-[10px] font-bold uppercase mb-0.5 text-blue-400">{day.shortDay}</span><span className={`text-lg font-black leading-none ${idx === safeIndex ? 'text-white' : 'text-slate-600'}`}>{day.dateNum}</span></button>))}</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 pb-24 custom-scrollbar">
                            {visibleMachines.map(m => { 
                                const mData = dayData[m.id] || {};
                                const slots = mData.slots || [{}, {}, {}, {}];
                                const order = ordersData[m.id];
                                const metrics = calculateOrderMetrics(m.id, order, data, ALL_ROWS, visibilityConfig.days);
                                return (
                                    <div key={m.id} className="bg-slate-800 rounded-xl p-3 shadow-sm border border-slate-700 relative overflow-hidden mb-3">
                                        <div className="flex justify-between items-start mb-2">
                                            <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center"><i data-lucide="cpu" className="w-5 h-5 opacity-50"></i></div><div><h3 className="font-black text-slate-200 text-sm">{m.name.replace('MAQ ','M-')}</h3><p className="text-[10px] text-slate-500 font-medium">{m.type}</p></div></div>
                                            {metrics.progress > 0 && <div className="text-[10px] font-bold text-blue-400 bg-blue-900/30 px-2 py-0.5 rounded">{metrics.progress.toFixed(0)}%</div>}
                                        </div>
                                        {order && order.totalQty > 0 && (
                                            <div className="mb-3">
                                                <div className="text-[10px] text-yellow-500 font-bold uppercase flex justify-between border-b border-slate-700 pb-1"><span>{order.model}</span><span>{Number(order.totalQty).toLocaleString()} pzas</span></div>
                                                <div className="h-1 w-full bg-slate-700 mt-1 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{width: `${metrics.progress}%`}}></div></div>
                                            </div>
                                        )}
                                        <div className="bg-slate-900/50 rounded-lg p-2 border border-slate-700/50">
                                            <div className="grid grid-cols-2 gap-2 mb-1"><div className="text-[9px] text-center font-bold text-blue-400 uppercase tracking-widest border-b border-blue-900 pb-1">Andrés</div><div className="text-[9px] text-center font-bold text-orange-400 uppercase tracking-widest border-b border-orange-900 pb-1">Balta</div></div>
                                            <div className="grid grid-cols-2 gap-2">{[0,1].map(idx => (<div key={idx} className="h-16"><ProductionSlot slotData={slots[idx]} index={idx} disabled={!canEditSlot(m.id, idx)} onUpdate={(idx, field, val) => handleUpdateSlot(rowId, m.id, idx, field, val)} /></div>))}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 backdrop-blur border-t border-slate-700 p-3 flex justify-between items-center z-30">
                             <button onClick={() => setWeekOffset(prev => Math.max(0, prev - 1))} className="p-3 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400"><i data-lucide="chevron-left" className="w-5 h-5"></i></button>
                             <div className="text-center"><span className="block text-xs font-bold text-blue-400 uppercase tracking-wide">{weekLabel}</span></div>
                             <button onClick={() => setWeekOffset(prev => prev + 1)} className="p-3 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400"><i data-lucide="chevron-right" className="w-5 h-5"></i></button>
                        </div>
                    </div>
                );
            };

            const DesktopView = () => (
                <div className="h-full flex flex-col bg-slate-900 overflow-hidden relative">
                    <header className="bg-slate-800 shadow-sm border-b border-slate-700 p-3 flex justify-between items-center z-20 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="bg-gradient-to-br from-blue-600 to-blue-800 p-2 rounded-lg text-white shadow-lg"><i data-lucide="factory" className="w-5 h-5"></i></div>
                            <h1 className="font-bold text-slate-200 hidden md:block">Control MAES - Tejido</h1>
                            <div className="flex items-center gap-2 bg-slate-900/50 p-1 rounded-lg border border-slate-700/50 ml-6">
                                <button onClick={() => setWeekOffset(prev => Math.max(0, prev - 1))} className="p-1 hover:bg-slate-700 rounded text-slate-400"><i data-lucide="chevron-left" className="w-5 h-5"></i></button>
                                <div className="flex items-center gap-2 px-2 cursor-pointer" onClick={() => setShowCalendar(true)}><i data-lucide="calendar" className="w-4 h-4 text-blue-400"></i><span className="text-sm font-bold text-white uppercase w-32 text-center select-none">{weekLabel}</span></div>
                                <button onClick={() => setWeekOffset(prev => prev + 1)} className="p-1 hover:bg-slate-700 rounded text-slate-400"><i data-lucide="chevron-right" className="w-5 h-5"></i></button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right px-3 py-1 bg-slate-900/50 rounded-lg border border-slate-700/50"><p className="text-sm font-bold text-blue-400">{user.name.toUpperCase()}</p><p className="text-[10px] text-slate-500 uppercase font-medium leading-none">{user.area}</p></div>
                            <div className="flex gap-2">
                                {canManageOrders && <button onClick={() => setShowOrderManager(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-sm font-bold flex items-center gap-2 shadow-lg hover:scale-105 transition-all"><i data-lucide="clipboard-list" className="w-4 h-4"></i> Pedidos</button>}
                                {canConfig && <button onClick={() => setShowVisibilityModal(true)} className="p-2 bg-slate-700 hover:bg-slate-600 rounded text-slate-300"><i data-lucide="settings" className="w-5 h-5"></i></button>}
                                <button onClick={() => setUser(null)} className="p-2 text-red-400 hover:bg-red-900/20 rounded"><i data-lucide="log-out" className="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 overflow-auto p-2 custom-scrollbar relative">
                        <div className="bg-slate-800 rounded-xl shadow border border-slate-700 overflow-hidden h-full">
                            <div className="overflow-auto custom-scrollbar h-full relative">
                                <table className="w-full border-collapse">
                                    <thead className="sticky top-0 z-20 bg-slate-900 shadow-sm border-b border-slate-700">
                                        <tr>
                                            <th className="sticky left-0 z-30 bg-slate-900 p-3 min-w-[120px] text-left border-r border-slate-700 text-xs font-bold text-slate-500">FECHA</th>
                                            {visibleMachines.map(m => {
                                                const order = ordersData[m.id];
                                                const metrics = calculateOrderMetrics(m.id, order, data, ALL_ROWS, visibilityConfig.days);
                                                return (
                                                    <th key={m.id} className={`min-w-[160px] p-2 border-r border-slate-700 ${metrics.isPlanned ? 'bg-yellow-900/10' : ''}`}>
                                                        <div className="flex flex-col items-center">
                                                            <span className="text-xs font-bold text-blue-400">{m.name.replace('MAQ ','')}</span>
                                                            {order && order.totalQty > 0 ? (
                                                                <div className="mt-1 w-full px-2">
                                                                    <div className="flex justify-between items-center text-[9px] font-black text-yellow-400 uppercase leading-none mb-1"><span>{order.model}</span><span>{metrics.progress.toFixed(0)}%</span></div>
                                                                    <div className="h-1 bg-slate-700 rounded-full overflow-hidden w-full"><div className="h-full bg-blue-500" style={{width: `${metrics.progress}%`}}></div></div>
                                                                    <span className="block text-[8px] text-slate-500 mt-1">Fin: {metrics.finishDate === 'COMPLETADO' ? 'OK' : metrics.finishDate ? new Date(metrics.finishDate).toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) : '-'}</span>
                                                                </div>
                                                            ) : <span className="text-[9px] text-slate-600">Sin Orden</span>}
                                                        </div>
                                                    </th>
                                                );
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {currentWeekRows.map(row => {
                                            const rowId = row.id; const rowData = data[rowId] || {};
                                            return (
                                                <tr key={rowId} className="border-b border-slate-700 hover:bg-slate-700/50 transition-colors">
                                                    <td className="sticky left-0 bg-slate-800 p-2 border-r border-slate-700 text-xs font-bold text-slate-400 shadow-[2px_0_5px_rgba(0,0,0,0.3)]">{row.shortDay} <br/> <span className="text-lg text-slate-200">{row.dateNum}</span></td>
                                                    {visibleMachines.map(m => {
                                                        const mData = rowData[m.id] || {}; const slots = mData.slots || [{}, {}, {}, {}];
                                                        const metrics = calculateOrderMetrics(m.id, ordersData[m.id], data, ALL_ROWS, visibilityConfig.days);
                                                        const isFinishDay = metrics.finishDate === row.isoDate;
                                                        
                                                        return (
                                                            <td key={m.id} className={`p-1 border-r border-slate-700 relative h-[80px] ${isFinishDay ? 'bg-green-900/30 border-green-500/50' : ''}`}>
                                                                <div className="flex flex-col h-full">
                                                                    <div className="grid grid-cols-2 gap-1 mb-0.5"><div className="text-[8px] text-center text-blue-400 font-bold bg-slate-900/50 rounded">A</div><div className="text-[8px] text-center text-orange-400 font-bold bg-slate-900/50 rounded">B</div></div>
                                                                    <div className="grid grid-cols-2 gap-1 flex-1">{[0,1].map(idx => (<ProductionSlot key={idx} slotData={slots[idx]} index={idx} disabled={!canEditSlot(m.id, idx)} onUpdate={(idx, field, val) => handleUpdateSlot(rowId, m.id, idx, field, val)} />))}</div>
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );

            return (
                <div className="h-full relative">
                    {showOrderManager && <OrderManager onClose={() => setShowOrderManager(false)} onSaveOrders={handleSaveOrder} onDeleteOrder={handleDeleteOrder} ordersData={ordersData} allProductionData={data} allRows={ALL_ROWS} hiddenDays={visibilityConfig.days} />}
                    {showVisibilityModal && <VisibilityModal onClose={() => setShowVisibilityModal(false)} currentHiddenMachines={visibilityConfig.machines} currentHiddenDays={visibilityConfig.days} onSaveVisibility={handleSaveVisibility} allRows={ALL_ROWS} />}
                    {showCalendar && <CalendarModal onClose={() => setShowCalendar(false)} onSelectDate={handleDateSelect} allRows={ALL_ROWS} />}
                    <div className="block md:hidden h-full"><MobileView /></div>
                    <div className="hidden md:block h-full"><DesktopView /></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
