        .report-page { background-color: #f8fafc; color: #1e293b; padding: 30px; font-family: sans-serif; }
        .report-header h1 { font-size: 24px; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px; }
        .report-section { margin-bottom: 20px; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; }
        .report-section h2 { font-size: 18px; font-weight: bold; color: #1e40af; margin-bottom: 10px; }

            { id: 'm29', name: 'MAQ 29', type: 'SANTONI EVO4' }, { id: 'm28', name: 'MAQ 28', type: 'SANTONI EVO4' },
            { id: 'm27', name: 'MAQ 27', type: 'SANTONI EVO4' }, { id: 'm33', name: 'MAQ 33', type: 'SANTONI EVO4' },
            { id: 'm1',  name: 'MAQ 1',  type: 'CIXING' }, { id: 'm30', name: 'MAQ 30', type: 'CIXING GE82' },
            { id: 'm31', name: 'MAQ 31', type: 'CIXING GE82' }, { id: 'm6',  name: 'MAQ 6',  type: 'CIXING GE82' },
            { id: 'm32', name: 'MAQ 32', type: 'CIXING GE82' }, { id: 'm13', name: 'MAQ 13', type: 'SANTONI EVO4' },
            { id: 'm12', name: 'MAQ 12', type: 'SANTONI EVO4' }, { id: 'm24', name: 'MAQ 24', type: 'SANTONI EVO4' },
            { id: 'm8',  name: 'MAQ 8',  type: 'SANTONI TOP2' },
        ];

        const generateCalendar = () => {
            const dates = [];
            const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
            const start = new Date(2025, 8, 1); 
            const end = new Date(2026, 11, 31);
            let idx = 0;
            for (let d = start; d <= end; d.setDate(d.getDate() + 1)) {
                dates.push({
                    index: idx++,
                    id: `${['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`,
                    shortDay: ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'][d.getDay()],
                    dateNum: d.getDate(),
                    month: months[d.getMonth()],
                    monthIndex: d.getMonth(),
                    year: d.getFullYear(), 
                    isoDate: d.toISOString().split('T')[0] 
                });
            }
            return dates;
        };

        const ALL_ROWS = generateCalendar();
        const INITIAL_STATE = (() => {
            const todayISO = new Date().toISOString().split('T')[0];
            const foundIndex = ALL_ROWS.findIndex(r => r.isoDate === todayISO);
            const safeIndex = foundIndex !== -1 ? foundIndex : 0;
            return { weekOffset: Math.floor(safeIndex / 7), selectedDayIndex: safeIndex % 7 };
        })();

        const getWeekLabel = (weekRows) => {
            if (!weekRows || weekRows.length === 0) return '';
            const f = weekRows[0], l = weekRows[weekRows.length - 1];
            return f.month === l.month ? `${f.month} ${f.year}` : `${f.month} - ${l.month} ${l.year}`;
        };

        // --- CÁLCULOS PRINCIPALES ---

        // 1. Métricas del Pedido (Ahora desacoplado de la tabla, usa verifiedLogs)
        const calculateOrderMetrics = (order) => {
            const metrics = { 
                progress: 0, produced: 0, totalNeeded: 0, 
                status: 'OK', finishDate: null, totalYarnConsumed: 0,
                partsStatus: [], operatorStats: {}
            };
            
            if (!order || !order.totalQty) return metrics;

            const isComposite = order.parts && order.parts.length > 0;
            const wasteMult = 1 + (Number(order.wastePercentage || 0) / 100);
            
            // Calcular produccion real basada en LOGS (iPad Pre)
            const logs = order.productionLog || [];
            let totalRealProduced = 0;
            const opStats = { 'Andrés': 0, 'Balta': 0 };

            if (isComposite) {
                // Lógica Compuestos
                let partsTracker = order.parts.map(p => ({...p, produced: 0}));
                logs.forEach(log => {
                    const partIdx = partsTracker.findIndex(p => p.name === log.partName);
                    if (partIdx !== -1) {
                        partsTracker[partIdx].produced += Number(log.qty);
                        metrics.totalYarnConsumed += (Number(log.qty) * Number(partsTracker[partIdx].weight));
                    }
                    if(opStats[log.operator] !== undefined) opStats[log.operator] += Number(log.qty);
                });
                metrics.partsStatus = partsTracker;
                
                // Progreso ponderado por tiempo de cada parte
                let totalMinutesNeeded = 0;
                let totalMinutesProduced = 0;
                order.parts.forEach(p => totalMinutesNeeded += (p.qty * p.time));
                partsTracker.forEach(p => totalMinutesProduced += (p.produced * p.time));
                
                metrics.progress = totalMinutesNeeded > 0 ? (totalMinutesProduced / totalMinutesNeeded) * 100 : 0;
                metrics.produced = partsTracker.reduce((acc, p) => acc + p.produced, 0); // Suma de piezas
            } else {
                // Lógica Simple
                totalRealProduced = logs.reduce((acc, log) => {
                    if(opStats[log.operator] !== undefined) opStats[log.operator] += Number(log.qty);
                    return acc + Number(log.qty);
                }, 0);
                
                metrics.produced = totalRealProduced;
                metrics.progress = (totalRealProduced / Number(order.totalQty)) * 100;
                metrics.totalYarnConsumed = totalRealProduced * Number(order.pieceWeightGrams);
                metrics.totalNeeded = Math.max(0, Number(order.totalQty) - totalRealProduced);
            }

            metrics.totalYarnConsumed = (metrics.totalYarnConsumed * wasteMult) / 1000; // KG
            metrics.operatorStats = opStats;
            if (metrics.progress >= 100) metrics.status = 'COMPLETADO';
            
            return metrics;
        };

        // --- COMPONENTES ---

        const StatsModal = ({ onClose, dailyTotals, machineTotals }) => {
            const [view, setView] = useState('daily'); // 'daily' or 'machine'
            
            // Función simple para barras (sin librerías externas pesadas)
            const BarChart = ({ data, labelKey, valueKey, colorClass }) => {
                const maxVal = Math.max(...data.map(d => d[valueKey]), 1);
                return (
                    <div className="flex items-end justify-between h-64 gap-2 pt-10 pb-2">
                        {data.map((d, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center group relative">
                                <span className="text-[10px] text-white mb-1 font-bold absolute -top-4 opacity-0 group-hover:opacity-100 transition-opacity">{d[valueKey]}</span>
                                <div style={{height: `${(d[valueKey] / maxVal) * 100}%`}} className={`w-full min-w-[20px] rounded-t-md transition-all duration-500 ${colorClass} hover:opacity-80`}></div>
                                <span className="text-[9px] text-slate-400 mt-2 rotate-[-45deg] origin-top-left w-full text-center truncate">{d[labelKey]}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
                    <div className="bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col border border-slate-700" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800">
                            <div className="flex gap-4">
                                <button onClick={() => setView('daily')} className={`px-4 py-2 rounded font-bold ${view === 'daily' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>Por Día</button>
                                <button onClick={() => setView('machine')} className={`px-4 py-2 rounded font-bold ${view === 'machine' ? 'bg-green-600 text-white' : 'text-slate-400'}`}>Por Máquina</button>
                            </div>
                            <button onClick={onClose}><i data-lucide="x" className="text-slate-400"></i></button>
                        </div>
                        <div className="flex-1 p-8 bg-slate-900 overflow-hidden">
                            <h3 className="text-center text-white text-xl font-bold mb-4">{view === 'daily' ? 'Producción Diaria (Semana Actual)' : 'Producción por Máquina (Semana Actual)'}</h3>
                            {view === 'daily' 
                                ? <BarChart data={dailyTotals} labelKey="day" valueKey="total" colorClass="bg-blue-500" />
                                : <BarChart data={machineTotals} labelKey="machine" valueKey="total" colorClass="bg-green-500" />
                            }
                        </div>
                    </div>
                </div>
            );
        };

        const PreCountInterface = ({ ordersData, onAddCount, user }) => {
            const [selectedMachine, setSelectedMachine] = useState(null);
            const [selectedOperator, setSelectedOperator] = useState(null); // 'Andrés' or 'Balta'
            const [qty, setQty] = useState('');
            const [selectedPart, setSelectedPart] = useState(null); // Para compuestos

            const activeOrders = MACHINES.filter(m => ordersData[m.id]?.totalQty > 0 || ordersData[m.id]?.parts?.length > 0);
            
            const handleSubmit = () => {
                if (!selectedMachine || !selectedOperator || !qty) return alert('Completa todos los datos');
                const order = ordersData[selectedMachine];
                const isComposite = order.parts && order.parts.length > 0;
                
                if (isComposite && !selectedPart) return alert('Selecciona la parte');

                onAddCount(selectedMachine, {
                    qty: Number(qty),
                    operator: selectedOperator,
                    partName: selectedPart ? selectedPart.name : null,
                    date: new Date().toISOString()
                });
                setQty('');
                alert('Guardado Correctamente');
            };

            return (
                <div className="h-full flex flex-col bg-slate-900 p-4">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-black text-white">Verificación iPad</h1>
                        <div className="text-right"><p className="text-blue-400 font-bold">{user.name}</p></div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto space-y-6 custom-scrollbar">
                        {/* 1. Selección Máquina */}
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                            <h3 className="text-slate-400 text-sm uppercase font-bold mb-3">1. Seleccionar Máquina</h3>
                            <div className="grid grid-cols-4 gap-3">
                                {activeOrders.map(m => (
                                    <button key={m.id} onClick={() => {setSelectedMachine(m.id); setSelectedPart(null);}} className={`p-4 rounded-lg border-2 font-black text-lg ${selectedMachine === m.id ? 'bg-blue-600 border-blue-400 text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`}>
                                        {m.name.replace('MAQ ','')}
                                        <div className="text-[10px] font-normal mt-1 text-yellow-500 truncate">{ordersData[m.id].model}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {selectedMachine && ordersData[selectedMachine]?.parts?.length > 0 && (
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 fade-in">
                                <h3 className="text-slate-400 text-sm uppercase font-bold mb-3">1.5. Seleccionar Parte</h3>
                                <div className="flex flex-wrap gap-3">
                                    {ordersData[selectedMachine].parts.map(p => (
                                        <button key={p.name} onClick={() => setSelectedPart(p)} className={`px-6 py-3 rounded-lg border font-bold ${selectedPart?.name === p.name ? 'bg-purple-600 border-purple-400 text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`}>

                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 2. Operador */}
                        {selectedMachine && (
                             <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 fade-in">
                                <h3 className="text-slate-400 text-sm uppercase font-bold mb-3">2. Operador</h3>

                                    {['Andrés', 'Balta'].map(op => (
                                        <button key={op} onClick={() => setSelectedOperator(op)} className={`flex-1 py-6 rounded-xl border-2 text-xl font-bold ${selectedOperator === op ? 'bg-green-600 border-green-400 text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`}>
                                            {op}
                                        </button>
                                    ))}
                                </div>
                             </div>
                        )}

                        {/* 3. Cantidad */}
                        {selectedOperator && (
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 fade-in">

                                <div className="flex gap-4">
                                    <input type="number" value={qty} onChange={e => setQty(e.target.value)} className="flex-1 bg-slate-900 text-white text-4xl font-black p-4 text-center rounded-xl border border-slate-600 focus:border-blue-500 outline-none" placeholder="0" />
                                    <button onClick={handleSubmit} className="bg-blue-600 text-white px-8 rounded-xl font-black text-2xl hover:scale-105 transition-transform"><i data-lucide="plus" className="w-8 h-8"></i></button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ReportModal = ({ onClose, machineId, order, metrics }) => {
            const machine = MACHINES.find(m => m.id === machineId);
            const isComposite = order.parts && order.parts.length > 0;
            
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in no-print" onClick={onClose}>
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-4xl h-[95vh] flex flex-col border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900 no-print">

                            <button onClick={onClose}><i data-lucide="x" className="text-slate-400 w-5 h-5"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-0 custom-scrollbar report-page">

                            <div className="report-section">

                                    <div><span className="report-label">Hilo Consumido:</span><span className="report-value">{metrics.totalYarnConsumed.toFixed(2)} KG</span></div>
                                </div>

                                    <thead><tr><th>Operador</th><th>Piezas Producidas</th><th>% Contribución</th></tr></thead>

                                                <td>{op}</td>
                                                <td className="font-bold">{qty}</td>
                                                <td>{metrics.produced > 0 ? ((qty/metrics.produced)*100).toFixed(1) : 0}%</td>
                                            </tr>
                                        ))}
                                        <tr className="bg-slate-100 font-bold"><td>TOTAL</td><td>{metrics.produced}</td><td>100%</td></tr>
                                    </tbody>
                                </table>

        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [usersData, setUsersData] = useState(DEFAULT_USERS); 
            const [data, setData] = useState({});
            const [ordersData, setOrdersData] = useState({});
            const [loading, setLoading] = useState(true);
            const [weekOffset, setWeekOffset] = useState(INITIAL_STATE.weekOffset);
            const [showStats, setShowStats] = useState(false);
            const [showOrderManager, setShowOrderManager] = useState(false); // (Omitido OrderManager completo por brevedad, usar el anterior si es necesario, pero simplificado)
            
            // Cálculos para Tabla y Gráficas
            const currentWeekRows = useMemo(() => { const start = weekOffset * 7; return ALL_ROWS.slice(start, start + 7); }, [weekOffset]);
            const weekLabel = useMemo(() => getWeekLabel(currentWeekRows), [currentWeekRows]);

            // Totales para Tabla y Gráficas
            const { dailyTotals, machineTotals } = useMemo(() => {
                const dTotals = currentWeekRows.map(row => {
                    let sum = 0;
                    MACHINES.forEach(m => {
                        const slots = data[row.id]?.[m.id]?.slots || [];
                        sum += slots.reduce((a, s) => a + (Number(s?.qty) || 0), 0);
                    });
                    return { day: row.shortDay, total: sum };
                });

                const mTotals = MACHINES.map(m => {
                    let sum = 0;
                    currentWeekRows.forEach(row => {
                        const slots = data[row.id]?.[m.id]?.slots || [];
                        sum += slots.reduce((a, s) => a + (Number(s?.qty) || 0), 0);
                    });
                    return { machine: m.name.replace('MAQ ',''), total: sum };
                });

                return { dailyTotals: dTotals, machineTotals: mTotals };
            }, [data, currentWeekRows]);


            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            
            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        const unsubDb = onSnapshot(collection(db, 'produccion_2026'), (snap) => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setData(d); setLoading(false); });
                        const unsubOrders = onSnapshot(doc(db, 'settings', 'orders'), (docSnap) => { if (docSnap.exists()) setOrdersData(docSnap.data()); });
                        const unsubUsers = onSnapshot(doc(db, 'settings', 'users'), (docSnap) => { 
                            if (docSnap.exists()) { setUsersData(docSnap.data()); } else { setDoc(doc(db, 'settings', 'users'), DEFAULT_USERS); }
                        });
                        return () => { unsubDb(); unsubOrders(); unsubUsers(); };
                    } else signInAnonymously(auth);
                });
                return () => unsubAuth();
            }, []);

            // Función para iPad Pre (Actualiza Order Directamente)
            const handleAddPreCount = async (machineId, logData) => {
                const orderRef = doc(db, 'settings', 'orders');
                // Usamos notación de punto para actualizar solo el array de esa máquina
                await updateDoc(orderRef, {
                    [`${machineId}.productionLog`]: arrayUnion(logData)
                });
            };

            const handleUpdateSlot = async (rowId, machineId, slotIndex, value) => {
                 const currentMachineData = data[rowId]?.[machineId] || {};
                 const currentSlots = currentMachineData.slots || [{}, {}, {}, {}];
                 const updatedSlots = [...currentSlots];
                 if (!updatedSlots[slotIndex]) updatedSlots[slotIndex] = {};
                 updatedSlots[slotIndex].qty = value === '' ? '' : Number(value);
                 const updatedMachine = { ...currentMachineData, slots: updatedSlots };
                 await setDoc(doc(db, 'produccion_2026', rowId), { [machineId]: updatedMachine }, { merge: true });
            };

            if (!user) {
                const LoginScreen = () => {
                   const [pin, setPin] = useState('');
                   return (
                       <div className="flex items-center justify-center h-screen bg-slate-900">
                           <div className="bg-slate-800 p-8 rounded-xl shadow-2xl text-center">
                               <h2 className="text-white text-2xl font-bold mb-4">MAES 26</h2>
                               <input type="tel" value={pin} onChange={e => setPin(e.target.value)} className="password-mask text-4xl bg-slate-900 text-white p-3 rounded mb-4 text-center w-full" autoFocus />
                               <button onClick={() => usersData[pin] ? setUser({...usersData[pin], id: pin}) : alert('PIN Incorrecto')} className="bg-blue-600 w-full py-3 rounded text-white font-bold">ENTRAR</button>
                           </div>
                       </div>
                   )
                }
                return <LoginScreen />;
            }

            // VISTA iPad Pre
            if (user.role === ROLES.PRE_COUNT) {
                return <PreCountInterface ordersData={ordersData} onAddCount={handleAddPreCount} user={user} />;
            }

            // VISTA TABLA (Admin/Dev/Operator)
            return (
                <div className="h-full flex flex-col bg-slate-900">
                    <header className="bg-slate-800 p-3 flex justify-between items-center shadow-lg z-20">
                         <div className="flex items-center gap-4">
                            <h1 className="font-bold text-white hidden md:block">Control MAES</h1>
                            <div className="flex bg-slate-900/50 rounded p-1">
                                <button onClick={() => setWeekOffset(w => w-1)} className="px-2 text-slate-400"><i data-lucide="chevron-left"></i></button>
                                <span className="px-2 text-sm font-bold text-white w-32 text-center">{weekLabel}</span>
                                <button onClick={() => setWeekOffset(w => w+1)} className="px-2 text-slate-400"><i data-lucide="chevron-right"></i></button>
                            </div>
                         </div>
                         <div className="flex gap-2">
                            {(user.role === ROLES.ADMIN || user.role === ROLES.DEVELOPMENT) && (
                                <button onClick={() => setShowStats(true)} className="bg-indigo-600 text-white px-3 py-1 rounded text-sm font-bold flex gap-2 items-center hover:bg-indigo-500">
                                    <i data-lucide="bar-chart-2" className="w-4 h-4"></i> Estadísticas
                                </button>
                            )}
                            <button onClick={() => setUser(null)} className="text-red-400 p-2"><i data-lucide="log-out" className="w-5 h-5"></i></button>
                         </div>
                    </header>

                    <div className="flex-1 overflow-auto custom-scrollbar p-2">
                        <table className="w-full border-collapse">
                            <thead className="sticky top-0 z-30 bg-slate-900 text-xs font-bold text-slate-400 shadow-md">
                                <tr>
                                    <th className="sticky left-0 bg-slate-900 p-3 min-w-[100px] border-r border-slate-700 z-40">FECHA</th>
                                    {MACHINES.map(m => {
                                        const order = ordersData[m.id];
                                        const metrics = calculateOrderMetrics(order); // Usando lógica nueva
                                        return (
                                            <th key={m.id} className="min-w-[140px] p-2 border-r border-slate-700 bg-slate-800/50">
                                                <div className="flex flex-col">
                                                    <span className="text-blue-400 text-sm">{m.name.replace('MAQ ','')}</span>
                                                    {order?.totalQty > 0 || order?.parts?.length > 0 ? (
                                                        <div className="mt-1">
                                                            <div className="flex justify-between text-[9px] text-yellow-400">
                                                                <span>{order.model}</span>
                                                                <span>{metrics.progress.toFixed(0)}%</span>
                                                            </div>
                                                            <div className="h-1 bg-slate-700 rounded-full w-full mt-1 overflow-hidden"><div className="h-full bg-blue-500" style={{width: `${metrics.progress}%`}}></div></div>
                                                        </div>
                                                    ) : <span className="text-[9px] text-slate-600">-</span>}
                                                </div>
                                            </th>
                                        )
                                    })}
                                    <th className="min-w-[80px] p-2 bg-slate-800 text-white border-l border-slate-600">TOTAL DÍA</th>
                                </tr>
                            </thead>
                            <tbody>
                                {currentWeekRows.map((row, rIdx) => (
                                    <tr key={row.id} className="border-b border-slate-700 hover:bg-slate-800/30">
                                        <td className="sticky left-0 bg-slate-800 p-2 border-r border-slate-700 font-bold text-slate-400 z-20 shadow-[2px_0_5px_rgba(0,0,0,0.3)]">
                                            {row.shortDay} <span className="text-lg text-white block">{row.dateNum}</span>
                                        </td>
                                        {MACHINES.map(m => {
                                            const slots = data[row.id]?.[m.id]?.slots || [{},{}];
                                            return (
                                                <td key={m.id} className="p-1 border-r border-slate-700 align-top">
                                                    <div className="grid grid-cols-2 gap-1 h-14">
                                                        {[0,1].map(idx => (
                                                            <div key={idx} className="bg-slate-800/50 rounded border border-slate-700/50 flex flex-col justify-center">
                                                                <input 
                                                                    type="number" 
                                                                    placeholder="-"
                                                                    className="slot-input text-white text-xs"
                                                                    value={slots[idx]?.qty || ''}
                                                                    onChange={(e) => handleUpdateSlot(row.id, m.id, idx, e.target.value)}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </td>
                                            );
                                        })}
                                        <td className="text-center font-black text-white bg-slate-800/50 border-l border-slate-600">
                                            {dailyTotals[rIdx].total}
                                        </td>
                                    </tr>
                                ))}
                                {/* Fila de Totales por Máquina (Abajo) */}
                                <tr className="bg-slate-800 sticky bottom-0 z-30 shadow-[0_-2px_10px_rgba(0,0,0,0.5)] border-t-2 border-slate-600">
                                    <td className="sticky left-0 bg-slate-800 p-2 font-bold text-yellow-400 border-r border-slate-600 z-40 text-right">TOTAL SEM:</td>
                                    {machineTotals.map((mt, i) => (
                                        <td key={i} className="text-center font-black text-yellow-400 py-3 border-r border-slate-700 text-lg">
                                            {mt.total}
                                        </td>
                                    ))}
                                    <td className="text-center font-black text-xl text-green-400 bg-slate-900 border-l border-slate-600">
                                        {machineTotals.reduce((a,b) => a + b.total, 0)}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    {showStats && <StatsModal onClose={() => setShowStats(false)} dailyTotals={dailyTotals} machineTotals={machineTotals} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
